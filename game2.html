<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EKA Snap Mobile Final</title>
    <style id="theme-styles"></style>
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.12); --vh: 1vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background: var(--bg); color: #fff;
            height: calc(var(--vh) * 100); width: 100vw;
            overflow: hidden; font-family: sans-serif;
            display: flex; flex-direction: column;
            touch-action: none;
        }

        .screen {
            display: none; position: absolute; inset: 0;
            width: 100%; height: 100%; flex-direction: column;
            padding: 15px; z-index: 10; background: inherit;
        }
        .active { display: flex; z-index: 100; }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px;
        }

        #shapesGrid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); gap: 8px;
            flex: 1; min-height: 0; margin: 10px 0;
        }

        .icecube {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            touch-action: none;
        }

        .circle { width: 50%; height: 50%; border-radius: 50%; }
        .square { width: 50%; height: 50%; }
        .triangle { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 44px solid; }
        .star { width: 55%; height: 55%; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .hexagon { width: 55%; height: 55%; clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }

        header {
            padding: 10px 16px 6px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            color: #fff;
        }
        header h1 {
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.5px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .stat-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .timer-container {
            flex: 1;
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            margin: 0 10px;
            overflow: hidden;
            position: relative;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        #prompt-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-height: 50px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            color: white; font-weight: bold; font-size: 1.1rem; margin-top: 10px;
            cursor: pointer; background: var(--primary);
        }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; margin-bottom: 10px;
        }

        /* Leaderboard Styles */
        .leaderboard {
            background: rgba(255, 255, 255, 0.07);
            padding: 15px;
            border-radius: 18px;
            margin-top: 20px;
            width: 100%;
            max-height: 28vh;
            overflow-y: auto;
            color: white;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard th, .leaderboard td {
            padding: 6px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .leaderboard th {
            color: #f9ca24;
        }

        .firebase-status {
            font-size: 11px;
            color: #55efc4;
            margin-top: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="screen-start" class="screen active">
    <h2 style="text-align:center">EKA MOBILE SNAP</h2>
    <div class="glass-panel" style="margin-top: auto; margin-bottom: 10px;">
        <input type="text" id="playerName" placeholder="Player Name" maxlength="10">
        <select id="ageSelect" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
            <option value="Age < 8">Age &lt; 8</option>
            <option value="Age 8-12">Age 8-12</option>
            <option value="Age 12-16" selected>Age 12-16</option>
            <option value="Age 16-20">Age 16-20</option>
            <option value="Age 20+">Age 20+</option>
        </select>
        <select id="themeDropdown" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);"></select>
        <button id="startBtn" style="background: #10b981;">START ADVENTURE</button>
    </div>

    <div class="leaderboard" style="margin-bottom: 20px;">
        <h3 style="text-align: center; margin-bottom: 8px; font-size: 13px; color: #f9ca24; text-transform: uppercase;">🏆 Top 10 Leaders 🏆</h3>
        <div style="display: flex; gap: 5px; margin-bottom: 8px;">
            <button id="btnTop10" onclick="loadScoresFromFirebase('top')" style="flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; font-size:9px; font-weight:bold; padding:6px; border-radius:8px; cursor:pointer;">🏆 TOP 10</button>
            <button id="btnRecent60" onclick="loadScoresFromFirebase('recent')" style="flex:1; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; font-size:9px; font-weight:bold; padding:6px; border-radius:8px; cursor:pointer; opacity:0.6;">🕒 RECENT 60</button>
        </div>
        <div id="firebaseStatus" class="firebase-status">Loading global scores...</div>
        <table>
            <thead>
            <tr>
                <th style="width: 20%">Rank</th>
                <th style="width: 30%">Score</th>
                <th style="width: 50%">Name</th>
            </tr>
            </thead>
            <tbody id="leaderboardBody">
            <tr><td>-</td><td>-</td><td>-</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="screen-game" class="screen">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <a href="games.html" style="text-decoration:none; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:15px; color:white; font-weight:bold; font-size:0.8rem;">⬅ Home</a>
            <h1>EKA MOBILE SNAP</h1>
            <div style="width:50px;"></div>
        </div>
        <div class="stats-row">
            <span class="stat-badge" id="disp-timer">⏱️ 01:00</span>
            <div class="timer-container"><div id="timer-bar"></div></div>
            <span class="stat-badge" id="disp-level">#1</span>
            <span class="stat-badge" id="disp-score">🌟 0</span>
        </div>
    </header>

    <div id="prompt-card">
        <span id="prompt" style="font-size: 1.2rem;">Get Ready...</span>
    </div>
    <div id="shapesGrid"></div>
</div>

<div id="screen-result" class="screen">
    <div class="glass-panel" style="margin: auto 0; text-align: center;">
        <h2>TIME UP!</h2>
        <div style="font-size: 2rem; margin-bottom: 20px;">Score: <b id="finalScore">0</b></div>
        <button id="submitScoreBtn" style="background: #6c5ce7; margin-bottom: 10px;">SAVE SCORE</button>
        <button id="restartBtn">PLAY AGAIN</button>
        <button onclick="location.reload()" style="background:#475569">HOME</button>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
    // ============================================
    // 🔥 FIREBASE CONFIGURATION
    // ============================================
    const firebaseConfig = {
        apiKey: "AIzaSyAEcPKE7n33wNUGxYpyqm5UWFjwXTT_x_c",
        authDomain: "eka-sir.firebaseapp.com",
        databaseURL: "https://eka-sir-default-rtdb.firebaseio.com",
        projectId: "eka-sir",
        storageBucket: "eka-sir.firebasestorage.app",
        messagingSenderId: "1022804634776",
        appId: "1:1022804634776:web:4c547efa80d625885734ed",
        measurementId: "G-5P543VP1EZ"
    };

    let firebaseDB = null;
    let firebaseInitialized = false;

    function initFirebase() {
        try {
            if (!firebaseConfig.apiKey || firebaseConfig.apiKey.includes("YOUR_API_KEY")) {
                document.getElementById('firebaseStatus').textContent = '⚠️ Firebase not configured.';
                return;
            }
            const app = firebase.initializeApp(firebaseConfig);
            firebaseDB = firebase.database();
            firebaseInitialized = true;
            document.getElementById('firebaseStatus').textContent = '✅ Connected to Firebase';
        } catch (e) {
            console.error("Firebase init error:", e);
            document.getElementById('firebaseStatus').textContent = '❌ Connection failed';
        }
    }

    function saveScoreToFirebase(name, score, age) {
        if (!firebaseInitialized || !firebaseDB) return Promise.resolve();
        const now = new Date();
        const scoreData = {
            name: name || 'Anonymous',
            score: parseInt(score) || 0,
            age: age,
            date: now.toISOString(),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };
        return firebaseDB.ref('scores_snap').push().set(scoreData);
    }

    function loadScoresFromFirebase(mode = 'top') {
        if (!firebaseInitialized || !firebaseDB) { loadLeaderboardLocal(); return; }
        const statusEl = document.getElementById('firebaseStatus');
        const lbTitle = document.querySelector('.leaderboard h3');
        const btnTop = document.getElementById('btnTop10');
        const btnRecent = document.getElementById('btnRecent60');

        statusEl.textContent = '⏳ Loading...';

        let query;
        if (mode === 'top') {
            lbTitle.textContent = '🏆 Top 10 Leaders 🏆';
            if(btnTop) btnTop.style.opacity = '1';
            if(btnRecent) btnRecent.style.opacity = '0.6';
            query = firebaseDB.ref('scores_snap').orderByChild('score').limitToLast(10);
        } else {
            lbTitle.textContent = '🕒 Recent 60 Games 🕒';
            if(btnTop) btnTop.style.opacity = '0.6';
            if(btnRecent) btnRecent.style.opacity = '1';
            query = firebaseDB.ref('scores_snap').orderByChild('timestamp').limitToLast(60);
        }

        query.once('value').then(snapshot => {
            const scores = [];
            snapshot.forEach(child => { scores.push(child.val()); });

            if (mode === 'top') {
                scores.sort((a, b) => b.score - a.score);
            } else {
                scores.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            }

            displayLeaderboard(scores, mode);
            statusEl.textContent = '✅ ' + (mode === 'top' ? 'Global Leaders' : 'Recent Games');
        }).catch(err => {
            console.error(err);
            statusEl.textContent = '⚠️ Local scores only';
            loadLeaderboardLocal();
        });
    }

    function displayLeaderboard(scores, mode = 'top') {
        const tbody = document.getElementById('leaderboardBody');
        const lbTableHead = document.querySelector('.leaderboard thead tr');

        if (mode === 'recent') {
            lbTableHead.innerHTML = '<th style="width: 20%">Time</th><th style="width: 30%">Score</th><th style="width: 50%">Name</th>';
        } else {
            lbTableHead.innerHTML = '<th style="width: 20%">Rank</th><th style="width: 30%">Score</th><th style="width: 50%">Name</th>';
        }

        if (!scores || scores.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center">No scores yet.</td></tr>';
            return;
        }

        tbody.innerHTML = scores.map((s, i) => {
            let firstCol = i + 1;
            if (mode === 'recent' && s.timestamp) {
                const date = new Date(s.timestamp);
                firstCol = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0');
            }
            return `
                <tr>
                    <td style="font-size: 10px; opacity: 0.8;">${firstCol}</td>
                    <td style="font-weight:bold;color:#f9ca24">${s.score}</td>
                    <td style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100px;">${s.name}</td>
                </tr>
            `;
        }).join('');
    }

    function loadLeaderboardLocal() {
        const scores = JSON.parse(localStorage.getItem('eka_score_mobilesnap') || '[]');
        displayLeaderboard(scores, 'top');
    }

    // Adjust for mobile address bar
    const resize = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight/100}px`);
    window.addEventListener('resize', resize); resize();

    const themes = {
        icecube: { bg: 'linear-gradient(135deg, #020617, #0f172a)', primary: '#00d2ff', secondary: '#0ea5e9' },
        sunset: { bg: 'linear-gradient(135deg, #431407, #7c2d12)', primary: '#fbbf24', secondary: '#ea580c' },
        neon: { bg: 'linear-gradient(135deg, #1a0033, #000000)', primary: '#ff00ff', secondary: '#00ffff' }
    };

    let score = 0, timeLeft = 60, level = 1, isGameActive = false, timerInterval;
    let currentAge = "Age 12-16";
    const colors = ['red', 'blue', 'green', 'orange', 'purple', 'yellow', 'white'];
    const shapes = ['circle', 'square', 'triangle', 'star', 'hexagon'];

    const AGE_CONFIGS = {
        "Age < 8":   { timeBonus: 8, penalty: 2, levelStep: 50 },
        "Age 8-12":  { timeBonus: 5, penalty: 5, levelStep: 100 },
        "Age 12-16": { timeBonus: 4, penalty: 8, levelStep: 150 },
        "Age 16-20": { timeBonus: 3, penalty: 10, levelStep: 200 },
        "Age 20+":   { timeBonus: 2, penalty: 15, levelStep: 250 }
    };

    // --- High-Performance Audio System (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;
    const synth = window.speechSynthesis;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSound(type) {
        initAudio();
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(); osc.stop(now + 0.15);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(); osc.stop(now + 0.2);
        } else if (type === 'click') {
            osc.frequency.setValueAtTime(800, now);
            gain.gain.setValueAtTime(0.05, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
            osc.start(); osc.stop(now + 0.05);
        }
    }

    function speak(text) {
        if (!synth) return;
        try {
            synth.cancel();
            if (text === "") return;
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.3;
            synth.speak(utter);
        } catch (e) { console.warn("Speech error:", e); }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    const handleStart = () => {
        initAudio();
        playSound('click');
        showScreen('screen-game');
        isGameActive = true;
        score = 0; timeLeft = 60; level = 1;
        currentAge = document.getElementById('ageSelect').value;
        updateStats();

        speak(""); // Android warm-up
        setTimeout(() => speak("Ready"), 50);

        nextPrompt();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (!isGameActive) return;
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) endGame();
        }, 1000);
    };

    function updateTimerUI() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('disp-timer').textContent = `⏱️ ${m}:${s}`;
        const pct = (timeLeft / 60) * 100;
        const bar = document.getElementById('timer-bar');
        if (bar) {
            bar.style.width = pct + "%";
            bar.style.backgroundColor = pct < 25 ? "#ff6b6b" : "#00b894";
        }
    }

    function updateStats() {
        document.getElementById('disp-score').textContent = `🌟 ${score}`;
        document.getElementById('disp-level').textContent = currentAge;
    }

    function nextPrompt() {
        const c = colors[Math.floor(Math.random() * colors.length)];
        const s = shapes[Math.floor(Math.random() * shapes.length)];
        document.getElementById('prompt').innerHTML = `Find: <b style="color:${c}">${c.toUpperCase()} ${s.toUpperCase()}</b>`;
        speak(`${c} ${s}`);
        renderGrid(c, s);
    }

    function renderGrid(targetC, targetS) {
        const grid = document.getElementById('shapesGrid');
        grid.innerHTML = '';
        let pool = [{ color: targetC, shape: targetS }];
        while(pool.length < 9) {
            let rc = colors[Math.floor(Math.random() * colors.length)], rs = shapes[Math.floor(Math.random() * shapes.length)];
            if(!pool.find(p => p.color === rc && p.shape === rs)) pool.push({color: rc, shape: rs});
        }
        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const cube = document.createElement('div');
            cube.className = 'icecube';
            const shp = document.createElement('div');
            shp.className = item.shape;
            if(item.shape === 'triangle') shp.style.borderBottomColor = item.color;
            else shp.style.backgroundColor = item.color;

            const handleTouch = (e) => {
                e.preventDefault();
                if(!isGameActive) return;
                initAudio();
                const config = AGE_CONFIGS[currentAge];
                if(item.color === targetC && item.shape === targetS) {
                    score += 10;
                    playSound('correct');
                    if (score > 0 && score % config.levelStep === 0) {
                        level++;
                        timeLeft = Math.min(60, timeLeft + config.timeBonus);
                    }
                    if(navigator.vibrate) navigator.vibrate(40);
                } else {
                    score = Math.max(0, score - config.penalty);
                    playSound('wrong');
                }
                updateStats();
                nextPrompt();
            };

            cube.addEventListener('pointerdown', handleTouch);
            cube.appendChild(shp);
            grid.appendChild(cube);
        });
    }

    function endGame() {
        isGameActive = false;
        clearInterval(timerInterval);
        document.getElementById('finalScore').textContent = score;
        showScreen('screen-result');
    }

    async function submitScore() {
        const name = document.getElementById('playerName').value || 'Anonymous';
        localStorage.setItem('eka_player_name', name);
        const btn = document.getElementById('submitScoreBtn');
        btn.disabled = true; btn.textContent = 'SAVING...';

        await saveScoreToFirebase(name, score, currentAge);

        const history = JSON.parse(localStorage.getItem('eka_score_mobilesnap') || '[]');
        history.unshift({ score, name, age: currentAge, date: new Date().toLocaleDateString() });
        localStorage.setItem('eka_score_mobilesnap', JSON.stringify(history.slice(0, 10)));

        btn.disabled = false; btn.textContent = 'SAVED!';
        setTimeout(() => location.reload(), 1000);
    }

    document.getElementById('startBtn').onclick = handleStart;
    document.getElementById('restartBtn').onclick = handleStart;
    document.getElementById('submitScoreBtn').onclick = submitScore;

    window.onload = () => {
        const savedName = localStorage.getItem('eka_player_name');
        if (savedName) document.getElementById('playerName').value = savedName;
        initFirebase();
        loadScoresFromFirebase();
        const drop = document.getElementById('themeDropdown');
        for(let k in themes) drop.add(new Option(k.toUpperCase(), k));
        drop.onchange = (e) => {
            const t = themes[e.target.value];
            document.getElementById('theme-styles').innerHTML = `:root { --primary:${t.primary}; --secondary:${t.secondary}; --bg:${t.bg}; } body { background:${t.bg}; }`;
        };
        drop.dispatchEvent(new Event('change'));
        if (synth) synth.getVoices();
    };
</script>
</body>
</html>
