<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EKA Snap Mobile Final</title>
    <style id="theme-styles"></style>
    <style>
        :root {
            --primary: #00d2ff; --secondary: #3a7bd5; --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.12); --vh: 1vh;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        body {
            margin: 0; padding: 0;
            background: var(--bg); color: #fff;
            height: calc(var(--vh) * 100); width: 100vw;
            overflow: hidden; font-family: sans-serif;
            display: flex; flex-direction: column;
        }

        .screen {
            display: none; position: absolute; inset: 0;
            width: 100%; height: 100%; flex-direction: column;
            padding: 15px; z-index: 10; background: inherit;
        }
        .active { display: flex; z-index: 100; }

        .glass-panel {
            background: var(--glass); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 15px;
        }

        /* GRID FIX: Ensures 3x3 visibility */
        #shapesGrid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr); gap: 8px;
            flex: 1; min-height: 0; margin: 10px 0;
        }

        .icecube {
            background: rgba(255,255,255,0.05); border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Responsive Shape Sizes */
        .circle { width: 50%; height: 50%; border-radius: 50%; }
        .square { width: 50%; height: 50%; }
        .triangle { width: 0; height: 0; border-left: 22px solid transparent; border-right: 22px solid transparent; border-bottom: 44px solid; }
        .star { width: 55%; height: 55%; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
        .hexagon { width: 55%; height: 55%; clip-path: polygon(25% 5%, 75% 5%, 100% 50%, 75% 95%, 25% 95%, 0% 50%); }

        /* Standardized Header & Stats */
        header {
            padding: 10px 16px 6px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            color: #fff;
        }
        header h1 {
            font-size: clamp(1rem, 4vw, 1.3rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.5px;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 6px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .stat-badge {
            background: rgba(255, 255, 255, 0.15);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            white-space: nowrap;
        }
        .timer-container {
            flex: 1;
            height: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            margin: 0 10px;
            overflow: hidden;
            position: relative;
        }
        #timer-bar {
            height: 100%;
            width: 100%;
            background: var(--primary);
            transition: width 1s linear;
        }

        #prompt-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            min-height: 50px;
            margin-top: 5px;
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

<div id="screen-start" class="screen active">
    <h2 style="text-align:center">EKA MOBILE SNAP</h2>
    <div class="glass-panel" style="margin-top: auto; margin-bottom: 20px;">
        <input type="text" id="playerName" placeholder="Player Name" maxlength="10">
        <select id="ageSelect" class="input-field" style="width: 100%; margin: 8px 0; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
            <option value="Age < 8">Age &lt; 8</option>
            <option value="Age 8-12">Age 8-12</option>
            <option value="Age 12-16" selected>Age 12-16</option>
            <option value="Age 16-20">Age 16-20</option>
            <option value="Age 20+">Age 20+</option>
        </select>
        <select id="themeDropdown"></select>
        <button id="startBtn" style="background: #10b981;">START ADVENTURE</button>
    </div>
</div>

<div id="screen-game" class="screen">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
            <a href="games.html" style="text-decoration:none; background:rgba(255,255,255,0.2); padding:4px 10px; border-radius:15px; color:white; font-weight:bold; font-size:0.8rem;">⬅ Home</a>
            <h1>EKA MOBILE SNAP</h1>
            <div style="width:50px;"></div>
        </div>
        <div class="stats-row">
            <span class="stat-badge" id="disp-timer">⏱️ 01:00</span>
            <div class="timer-container"><div id="timer-bar"></div></div>
            <span class="stat-badge" id="disp-level">#1</span>
            <span class="stat-badge" id="disp-score">🌟 0</span>
        </div>
    </header>

    <div id="prompt-card">
        <span id="prompt" style="font-size: 1.2rem;">Get Ready...</span>
    </div>
    <div id="shapesGrid"></div>
</div>

<div id="screen-result" class="screen">
    <div class="glass-panel" style="margin: auto 0; text-align: center;">
        <h2>TIME UP!</h2>
        <div style="font-size: 2rem; margin-bottom: 20px;">Score: <b id="finalScore">0</b></div>
        <button id="restartBtn">PLAY AGAIN</button>
        <button onclick="location.reload()" style="background:#475569">HOME</button>
    </div>
</div>

<script>
    // Adjust for mobile address bar
    const resize = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight/100}px`);
    window.addEventListener('resize', resize); resize();

    const themes = {
        icecube: { bg: 'linear-gradient(135deg, #020617, #0f172a)', primary: '#00d2ff', secondary: '#0ea5e9' },
        sunset: { bg: 'linear-gradient(135deg, #431407, #7c2d12)', primary: '#fbbf24', secondary: '#ea580c' }
    };

    let score = 0, timeLeft = 60, level = 1, isGameActive = false, timerInterval;
    let currentAge = "Age 12-16";
    const synth = window.speechSynthesis;
    const colors = ['red', 'blue', 'green', 'orange', 'purple', 'yellow', 'white'];
    const shapes = ['circle', 'square', 'triangle', 'star', 'hexagon'];

    const AGE_CONFIGS = {
        "Age < 8":   { timeBonus: 8, penalty: 2, levelStep: 50 },
        "Age 8-12":  { timeBonus: 5, penalty: 5, levelStep: 100 },
        "Age 12-16": { timeBonus: 4, penalty: 8, levelStep: 150 },
        "Age 16-20": { timeBonus: 3, penalty: 10, levelStep: 200 },
        "Age 20+":   { timeBonus: 2, penalty: 15, levelStep: 250 }
    };

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 1.2;
        synth.speak(utter);
    }

    const handleStart = () => {
        showScreen('screen-game');
        isGameActive = true;
        score = 0; timeLeft = 60; level = 1;
        currentAge = document.getElementById('ageSelect').value;
        updateStats();

        speak("Ready");

        nextPrompt();
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) endGame();
        }, 1000);
    };

    function updateTimerUI() {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('disp-timer').textContent = `⏱️ ${m}:${s}`;
        const pct = (timeLeft / 60) * 100;
        const bar = document.getElementById('timer-bar');
        bar.style.width = pct + "%";
        bar.style.backgroundColor = pct < 25 ? "#ff6b6b" : "#00b894";
    }

    function updateStats() {
        document.getElementById('disp-score').textContent = `🌟 ${score}`;
        document.getElementById('disp-level').textContent = currentAge;
    }

    function nextPrompt() {
        const c = colors[Math.floor(Math.random() * colors.length)];
        const s = shapes[Math.floor(Math.random() * shapes.length)];
        document.getElementById('prompt').innerHTML = `Find: <b style="color:${c}">${c.toUpperCase()} ${s.toUpperCase()}</b>`;
        speak(`${c} ${s}`);
        renderGrid(c, s);
    }

    function renderGrid(targetC, targetS) {
        const grid = document.getElementById('shapesGrid');
        grid.innerHTML = '';
        let pool = [{ color: targetC, shape: targetS }];
        while(pool.length < 9) {
            let rc = colors[Math.floor(Math.random() * colors.length)], rs = shapes[Math.floor(Math.random() * shapes.length)];
            if(!pool.find(p => p.color === rc && p.shape === rs)) pool.push({color: rc, shape: rs});
        }
        pool.sort(() => Math.random() - 0.5).forEach(item => {
            const cube = document.createElement('div');
            cube.className = 'icecube';
            const shp = document.createElement('div');
            shp.className = item.shape;
            if(item.shape === 'triangle') shp.style.borderBottomColor = item.color;
            else shp.style.backgroundColor = item.color;

            cube.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if(!isGameActive) return;
                const config = AGE_CONFIGS[currentAge];
                if(item.color === targetC && item.shape === targetS) {
                    score += 10;
                    if (score > 0 && score % config.levelStep === 0) {
                        level++;
                        timeLeft = Math.min(60, timeLeft + config.timeBonus);
                    }
                    if(navigator.vibrate) navigator.vibrate(40);
                } else {
                    score = Math.max(0, score - config.penalty);
                }
                updateStats();
                nextPrompt();
            });
            cube.appendChild(shp);
            grid.appendChild(cube);
        });
    }

    function endGame() {
        isGameActive = false;
        clearInterval(timerInterval);
        document.getElementById('finalScore').textContent = score;
        saveScore(score);
        showScreen('screen-result');
    }

    function saveScore(score) {
        const key = 'eka_score_mobilesnap';
        const history = JSON.parse(localStorage.getItem(key) || '[]');
        history.unshift({ score: score, date: new Date().toLocaleDateString(), age: currentAge });
        localStorage.setItem(key, JSON.stringify(history.slice(0, 10)));
    }

    // Attach listeners directly to avoid mobile lag
    document.getElementById('startBtn').onclick = handleStart;
    document.getElementById('restartBtn').onclick = handleStart;

    window.onload = () => {
        const drop = document.getElementById('themeDropdown');
        for(let k in themes) drop.add(new Option(k.toUpperCase(), k));
        drop.onchange = (e) => {
            const t = themes[e.target.value];
            document.getElementById('theme-styles').innerHTML = `:root { --primary:${t.primary}; --secondary:${t.secondary}; --bg:${t.bg}; } body { background:${t.bg}; }`;
        };
        drop.dispatchEvent(new Event('change'));
    };
</script>
</body>
</html>
