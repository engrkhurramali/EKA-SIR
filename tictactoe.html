<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tic Tac Toe - EKA SIR</title>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --text: #f8fafc;
            --primary: #3b82f6; --primary-hover: #2563eb;
            --accent: #10b981; --danger: #ef4444;
            --cell: #334155; --cell-hover: #475569; --cell-disabled: #1e293b;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            --radius: 12px; --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --board-gap: 8px;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --surface: #ffffff; --text: #0f172a;
            --cell: #e2e8f0; --cell-hover: #cbd5e1; --cell-disabled: #f1f5f9;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        [data-theme="neon"] {
            --bg: #050505; --surface: #0a0a0a; --text: #00ffcc;
            --primary: #ff00ff; --accent: #00ff00;
            --cell: #111; --cell-hover: #222;
            --shadow: 0 0 15px rgba(0,255,204,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background var(--transition);
            padding: 10px;
        }

        .app { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 15px; }
        .screen { display: none; flex-direction: column; align-items: center; gap: 15px; animation: fadeIn 0.4s ease; width: 100%; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-size: 1.8rem; margin: 5px 0; text-align: center; width: 100%; }
        h2 { font-size: 1.4rem; text-align: center; margin: 0 0 10px; width: 100%; }
        .card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            text-align: center;
        }

        input, select, button {
            width: 100%; padding: 14px 16px; margin: 6px 0; border: none; border-radius: 10px;
            font-size: 1rem; background: var(--cell); color: var(--text); outline: none; transition: var(--transition);
        }
        button {
            background: var(--primary);
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
        button:disabled { background: var(--cell-disabled); cursor: not-allowed; opacity: 0.6; transform: none !important; }
        .btn-secondary { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-secondary:hover { background: var(--primary); color: var(--text); }
        .btn-danger { background: var(--danger); }
        .btn-danger:hover { background: #dc2626; }

        .mode-select, .theme-select { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .mode-select label, .theme-select label {
            flex: 1; min-width: 90px; padding: 10px 8px; border: 2px solid var(--cell); border-radius: 8px;
            cursor: pointer; transition: var(--transition); text-align: center; font-size: 0.9rem;
        }
        .mode-select input, .theme-select input { display: none; }
        .mode-select input:checked + label, .theme-select input:checked + label {
            border-color: var(--primary);
            background: var(--cell-hover);
            box-shadow: 0 0 0 2px var(--primary);
        }

        /* FIXED 3x3 GRID - Full mobile width, fixed aspect ratio */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--board-gap);
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1 / 1;
            margin: 5px auto;
            padding: var(--board-gap);
            background: var(--surface);
            border-radius: var(--radius);
        }
        .cell {
            background: var(--cell);
            border-radius: 10px;
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            aspect-ratio: 1 / 1;
            user-select: none;
        }
        .cell:hover:not(.taken) { background: var(--cell-hover); transform: scale(1.03); }
        .cell.taken { cursor: default; transform: none !important; }
        .cell.x { color: var(--primary); text-shadow: 0 0 10px rgba(59,130,246,0.3); }
        .cell.o { color: var(--accent); text-shadow: 0 0 10px rgba(16,185,129,0.3); }
        .cell.winning { animation: pulse 0.5s ease-in-out 3; background: var(--primary); color: white; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .status {
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 26px;
            margin: 5px 0;
            text-align: center;
            width: 100%;
        }
        .round-counter {
            font-size: 0.9rem;
            opacity: 0.85;
            margin-bottom: 5px;
            width: 100%;
            text-align: center;
        }
        .scores {
            display: flex;
            justify-content: space-around;
            width: 100%;
            font-size: 0.95rem;
            background: var(--surface);
            padding: 10px;
            border-radius: 10px;
        }
        .scores span { display: flex; align-items: center; gap: 4px; }

        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        th, td { padding: 10px 8px; border-bottom: 1px solid var(--cell); text-align: left; font-size: 0.9rem; }
        th { color: var(--primary); font-weight: 600; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: var(--cell-hover); }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            color: var(--text);
            padding: 12px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 1000;
            max-width: 90%;
            text-align: center;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.success { border-left: 4px solid var(--accent); }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; width: 100%; }
        .flex-center { display: flex; justify-content: center; align-items: center; }
        .text-center { text-align: center; }
        .mt-10 { margin-top: 10px; }
        .mb-5 { margin-bottom: 5px; }

        @media (max-width: 360px) {
            .board { gap: 6px; padding: 6px; }
            .cell { font-size: clamp(2rem, 7vw, 3rem); }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- SCREEN 1: MENU -->
    <div id="screen-menu" class="screen active">
        <h1>🎮 Tic Tac Toe</h1>
        <div class="card">
            <input type="text" id="playerName" placeholder="Enter Your Name (max 15 chars)" maxlength="15" required>

            <h3 class="mb-5">🎯 Game Mode</h3>
            <div class="mode-select">
                <input type="radio" name="mode" id="pvp" value="pvp" checked>
                <label for="pvp">👥 PvP</label>
                <input type="radio" name="mode" id="pvc" value="pvc">
                <label for="pvc">🤖 PvC</label>
            </div>

            <h3 class="mb-5 mt-10">🎨 Theme</h3>
            <div class="theme-select">
                <input type="radio" name="theme" id="dark" value="dark" checked>
                <label for="dark">🌙 Dark</label>
                <input type="radio" name="theme" id="light" value="light">
                <label for="light">☀️ Light</label>
                <input type="radio" name="theme" id="neon" value="neon">
                <label for="neon">⚡ Neon</label>
            </div>

            <div class="flex-row mt-10">
                <button id="btn-start">▶️ Start Game</button>
                <button id="btn-leaderboard" class="btn-secondary">🏆 Leaders</button>
            </div>
        </div>
    </div>

    <!-- SCREEN 2: GAME -->
    <div id="screen-game" class="screen">
        <div class="round-counter">Round: <b id="round-counter">1</b>/10</div>
        <div class="scores">
            <span>✔️ <b id="score-x">0</b></span>
            <span>⭕ <b id="score-o">0</b></span>
            <span>🤝 <b id="score-draw">0</b></span>
        </div>
        <div class="status" id="game-status">Player X's Turn</div>

        <!-- FIXED 3x3 GRID - Takes full mobile width -->
        <div class="board" id="board"></div>

        <div class="flex-row">
            <button id="btn-reset">🔄 New Round</button>
            <button id="btn-exit" class="btn-secondary btn-danger">🚪 Exit</button>
        </div>
    </div>

    <!-- SCREEN 3: GAME OVER (Save option ONLY appears here) -->
    <div id="screen-gameover" class="screen">
        <h2 id="result-title">🏁 Session Complete</h2>
        <div class="card">
            <p id="result-message" style="margin-bottom:12px; font-size:1rem; line-height:1.4;"></p>

            <!-- Final Score Summary -->
            <div style="background:var(--cell); padding:12px; border-radius:8px; margin:10px 0; text-align:left;">
                <div>👤 Player X: <b id="final-x" style="color:var(--primary)">0</b></div>
                <div>🤖 Player O: <b id="final-o" style="color:var(--accent)">0</b></div>
                <div>🤝 Draws: <b id="final-draw">0</b></div>
            </div>

            <!-- SAVE SECTION - Only visible after game ends -->
            <div id="save-section">
                <input type="text" id="winner-name" placeholder="Name for leaderboard" maxlength="15">
                <input type="number" id="score-value" placeholder="Points to submit" min="10" max="100" value="10">
                <button id="btn-submit">💾 Submit to Leaderboard</button>
            </div>

            <button id="btn-back-menu" class="btn-secondary mt-10">🏠 Main Menu</button>
        </div>
    </div>

    <!-- SCREEN 4: LEADERBOARD -->
    <div id="screen-leaderboard" class="screen">
        <h2>🏆 Top 15 Players</h2>
        <div class="card" style="max-height: 55vh; overflow-y: auto; padding: 10px;">
            <table>
                <thead><tr><th>#</th><th>Name</th><th>Score</th></tr></thead>
                <tbody id="leaderboard-body"><tr><td colspan="3">⏳ Loading...</td></tr></tbody>
            </table>
        </div>
        <button id="btn-back-lb" class="btn-secondary" style="margin-top:10px; width:auto; padding:10px 25px;">⬅️ Back</button>
    </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
    // 🔥 FIREBASE SETUP - KEPT INTACT AS REQUESTED
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, push, query, orderByChild, limitToLast, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAEcPKE7n33wNUGxYpyqm5UWFjwXTT_x_c",
        authDomain: "eka-sir.firebaseapp.com",
        databaseURL: "https://eka-sir-default-rtdb.firebaseio.com",
        projectId: "eka-sir",
        storageBucket: "eka-sir.firebasestorage.app",
        messagingSenderId: "1022804634776",
        appId: "1:1022804634776:web:4c547efa80d625885734ed",
        measurementId: "G-5P543VP1EZ"
    };

    let db;
    try {
        const app = initializeApp(firebaseConfig);
        db = getDatabase(app);
        console.log("✅ Firebase initialized");
    } catch(e) {
        console.warn("⚠️ Firebase not configured. Leaderboard will run locally only.");
    }

    // 🎮 GAME STATE
    const state = {
        player: 'Player 1',
        mode: 'pvp',           // 'pvp' or 'pvc'
        theme: 'dark',
        board: Array(9).fill(null),
        currentPlayer: 'X',
        gameActive: true,
        sessionActive: true,   // Controls 10-round session
        round: 1,              // Current round (1-10)
        maxRounds: 10,         // Session ends after 10 rounds
        scores: { X: 0, O: 0, draws: 0 },
        winningCombo: null
    };

    // DOM Elements
    const screens = {
        menu: document.getElementById('screen-menu'),
        game: document.getElementById('screen-game'),
        gameover: document.getElementById('screen-gameover'),
        leaderboard: document.getElementById('screen-leaderboard')
    };

    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('game-status');
    const roundEl = document.getElementById('round-counter');
    const toast = document.getElementById('toast');
    const saveSection = document.getElementById('save-section');

    // 🧭 Screen Navigation
    function showScreen(name) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[name].classList.add('active');

        if(name === 'leaderboard') loadLeaderboard();
        if(name === 'gameover') {
            // Show save section only in game over screen
            saveSection.classList.remove('hidden');
            populateFinalScores();
        }
    }

    function showToast(msg, type = 'info') {
        toast.textContent = msg;
        toast.className = `toast show ${type === 'error' ? 'error' : type === 'success' ? 'success' : ''}`;
        setTimeout(() => toast.classList.remove('show'), 2800);
    }

    // 🎨 Theme Handler
    document.querySelectorAll('input[name="theme"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.value);
            state.theme = e.target.value;
        });
    });

    // ▶️ Start Game Handler
    document.getElementById('btn-start').addEventListener('click', () => {
        const name = document.getElementById('playerName').value.trim();
        if(!name) return showToast('⚠️ Please enter your name!', 'error');
        if(name.length > 15) return showToast('⚠️ Name too long (max 15)', 'error');

        state.player = name;
        state.mode = document.querySelector('input[name="mode"]:checked').value;

        // Reset session state
        state.round = 1;
        state.scores = { X: 0, O: 0, draws: 0 };
        state.sessionActive = true;

        resetRound();
        updateRoundDisplay();
        updateScoreUI();
        showScreen('game');
        showToast(`🎮 ${state.mode === 'pvc' ? 'vs Computer' : 'PvP'} - Round 1/10`, 'success');
    });

    // 🔄 Reset Round / Exit
    document.getElementById('btn-reset').addEventListener('click', () => {
        if(state.round < state.maxRounds) {
            state.round++;
            resetRound();
            updateRoundDisplay();
            showToast(`🔄 Round ${state.round}/10`, 'success');
        } else {
            endSession();
        }
    });

    document.getElementById('btn-exit').addEventListener('click', () => {
        if(confirm('Exit current session? Progress will be lost.')) {
            showScreen('menu');
        }
    });

    document.getElementById('btn-back-menu').addEventListener('click', () => showScreen('menu'));
    document.getElementById('btn-back-lb').addEventListener('click', () => showScreen('menu'));
    document.getElementById('btn-leaderboard').addEventListener('click', () => showScreen('leaderboard'));

    // 🔄 Reset single round (not session)
    function resetRound() {
        state.board.fill(null);
        state.currentPlayer = 'X';
        state.gameActive = true;
        state.winningCombo = null;
        statusEl.textContent = "Player X's Turn";
        renderBoard();
    }

    function updateRoundDisplay() {
        roundEl.textContent = state.round;
    }

    // 📦 Render Fixed 3x3 Board
    function renderBoard() {
        boardEl.innerHTML = '';
        state.board.forEach((cell, index) => {
            const div = document.createElement('div');
            div.className = `cell ${cell ? cell.toLowerCase() : ''} ${cell ? 'taken' : ''}`;
            if(state.winningCombo && state.winningCombo.includes(index)) {
                div.classList.add('winning');
            }
            div.textContent = cell || '';
            div.setAttribute('data-index', index);
            div.addEventListener('click', () => handleMove(index));
            boardEl.appendChild(div);
        });
    }

    // ✋ Handle Player Move
    function handleMove(index) {
        if(!state.gameActive || !state.sessionActive || state.board[index] || state.currentPlayer !== 'X') return;

        state.board[index] = 'X';
        renderBoard();

        const winResult = checkWin(state.board, 'X');
        if(winResult) {
            highlightWin(winResult);
            return endRound('X');
        }
        if(state.board.every(c => c)) return endRound('draw');

        state.currentPlayer = 'O';
        statusEl.textContent = state.mode === 'pvc' ? "🤖 AI Thinking..." : "Player O's Turn";

        if(state.mode === 'pvc') {
            setTimeout(makeAIMove, 400);
        }
    }

    // 🤖 Minimax AI (Unbeatable)
    function makeAIMove() {
        if(!state.gameActive || !state.sessionActive) return;

        let bestScore = -Infinity;
        let bestMove = -1;
        const boardCopy = [...state.board];

        for(let i = 0; i < 9; i++) {
            if(!boardCopy[i]) {
                boardCopy[i] = 'O';
                const score = minimax(boardCopy, 0, false);
                boardCopy[i] = null;
                if(score > bestScore) {
                    bestScore = score;
                    bestMove = i;
                }
            }
        }

        if(bestMove !== -1) {
            state.board[bestMove] = 'O';
            renderBoard();

            const winResult = checkWin(state.board, 'O');
            if(winResult) {
                highlightWin(winResult);
                return endRound('O');
            }
            if(state.board.every(c => c)) return endRound('draw');

            state.currentPlayer = 'X';
            statusEl.textContent = "Player X's Turn";
        }
    }

    function minimax(board, depth, isMaximizing) {
        if(checkWin(board, 'O')) return 10 - depth;
        if(checkWin(board, 'X')) return depth - 10;
        if(board.every(c => c)) return 0;

        if(isMaximizing) {
            let best = -Infinity;
            for(let i = 0; i < 9; i++) {
                if(!board[i]) {
                    board[i] = 'O';
                    best = Math.max(best, minimax(board, depth + 1, false));
                    board[i] = null;
                }
            }
            return best;
        } else {
            let best = Infinity;
            for(let i = 0; i < 9; i++) {
                if(!board[i]) {
                    board[i] = 'X';
                    best = Math.min(best, minimax(board, depth + 1, true));
                    board[i] = null;
                }
            }
            return best;
        }
    }

    function checkWin(board, player) {
        const wins = [
            [0,1,2], [3,4,5], [6,7,8], // Rows
            [0,3,6], [1,4,7], [2,5,8], // Columns
            [0,4,8], [2,4,6]            // Diagonals
        ];
        return wins.find(([a,b,c]) => board[a] === player && board[b] === player && board[c] === player);
    }

    function highlightWin(combo) {
        state.winningCombo = combo;
        renderBoard();
    }

    // 🏁 End Single Round
    function endRound(winner) {
        state.gameActive = false;

        if(winner === 'draw') {
            state.scores.draws++;
            statusEl.textContent = "🤝 Round Draw!";
            showToast("🤝 Draw!", 'info');
        } else {
            state.scores[winner]++;
            const winnerText = winner === 'X' ? 'Player X' : (state.mode === 'pvc' ? '🤖 AI' : 'Player O');
            statusEl.textContent = `🏆 ${winnerText} Wins!`;
            showToast(`🏆 ${winnerText} wins round!`, 'success');
        }

        updateScoreUI();

        // Check session end conditions
        if(state.round >= state.maxRounds) {
            setTimeout(endSession, 1200);
        } else {
            setTimeout(() => {
                if(state.sessionActive) {
                    state.round++;
                    resetRound();
                    updateRoundDisplay();
                }
            }, 1500);
        }
    }

    // 🏆 End 10-Round Session
    function endSession() {
        state.sessionActive = false;
        state.gameActive = false;

        let title, message, winnerName, points;

        if(state.mode === 'pvc') {
            // PvC: Computer wins session if it has more wins
            if(state.scores.O > state.scores.X) {
                title = "🤖 Computer Wins Session!";
                message = `AI: ${state.scores.O} | You: ${state.scores.X} | Draws: ${state.scores.draws}`;
                winnerName = "Computer AI";
                points = Math.max(10, state.scores.O * 10);
            } else if(state.scores.X > state.scores.O) {
                title = "🎉 You Win the Session!";
                message = `You: ${state.scores.X} | AI: ${state.scores.O} | Draws: ${state.scores.draws}`;
                winnerName = state.player;
                points = Math.max(10, state.scores.X * 10);
            } else {
                title = "🤝 Session Tied!";
                message = `You: ${state.scores.X} | AI: ${state.scores.O} | Draws: ${state.scores.draws}`;
                winnerName = state.player;
                points = Math.max(10, state.scores.draws * 5 + 20);
            }
        } else {
            // PvP: Higher score wins
            if(state.scores.X > state.scores.O) {
                title = "🏆 Player X Wins!";
                message = `X: ${state.scores.X} | O: ${state.scores.O} | Draws: ${state.scores.draws}`;
                winnerName = state.player;
                points = Math.max(10, state.scores.X * 10);
            } else if(state.scores.O > state.scores.X) {
                title = "🏆 Player O Wins!";
                message = `O: ${state.scores.O} | X: ${state.scores.X} | Draws: ${state.scores.draws}`;
                winnerName = "Player 2";
                points = Math.max(10, state.scores.O * 10);
            } else {
                title = "🤝 Session Tied!";
                message = `X: ${state.scores.X} | O: ${state.scores.O} | Draws: ${state.scores.draws}`;
                winnerName = state.player;
                points = Math.max(10, state.scores.draws * 5 + 20);
            }
        }

        document.getElementById('result-title').textContent = title;
        document.getElementById('result-message').textContent = message;
        document.getElementById('winner-name').value = winnerName;
        document.getElementById('score-value').value = points;

        showScreen('gameover');
        showToast("🏁 Session complete! Submit score below 👇", 'success');
    }

    function populateFinalScores() {
        document.getElementById('final-x').textContent = state.scores.X;
        document.getElementById('final-o').textContent = state.scores.O;
        document.getElementById('final-draw').textContent = state.scores.draws;
    }

    function updateScoreUI() {
        document.getElementById('score-x').textContent = state.scores.X;
        document.getElementById('score-o').textContent = state.scores.O;
        document.getElementById('score-draw').textContent = state.scores.draws;
    }

    // 💾 Submit Score to Firebase
    document.getElementById('btn-submit').addEventListener('click', async () => {
        const name = document.getElementById('winner-name').value.trim() || state.player;
        const score = parseInt(document.getElementById('score-value').value) || 10;

        if(!name) return showToast('⚠️ Enter a name to save', 'error');
        if(name.length > 15) return showToast('⚠️ Name max 15 chars', 'error');
        if(score < 10 || score > 100) return showToast('⚠️ Score must be 10-100', 'error');

        if(!db) {
            showToast('⚠️ Firebase not connected. Try again later.', 'error');
            return;
        }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.textContent = "⏳ Saving...";

        try {
            await push(ref(db, "tictactoe_leaderboard"), {
                name: name,
                score: score,
                mode: state.mode,
                date: new Date().toISOString(),
                timestamp: Date.now()
            });
            showToast("✅ Score submitted successfully!", 'success');
            btn.textContent = "✅ Saved!";
            setTimeout(() => {
                btn.disabled = false;
                btn.textContent = "💾 Submit to Leaderboard";
            }, 2000);
        } catch(err) {
            console.error("Save error:", err);
            showToast("❌ Failed: " + err.message, 'error');
            btn.disabled = false;
            btn.textContent = "💾 Submit to Leaderboard";
        }
    });

    // 📊 Load Leaderboard from Firebase
    async function loadLeaderboard() {
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '<tr><td colspan="3">⏳ Loading...</td></tr>';

        if(!db) {
            tbody.innerHTML = '<tr><td colspan="3">🔌 Firebase not configured</td></tr>';
            return;
        }

        try {
            const q = query(ref(db, "tictactoe_leaderboard"), orderByChild("score"), limitToLast(15));
            const snap = await get(q);

            if(!snap.exists()) {
                tbody.innerHTML = '<tr><td colspan="3">📭 No scores yet - Be first!</td></tr>';
                return;
            }

            const data = [];
            snap.forEach(child => data.push(child.val()));
            data.sort((a, b) => b.score - a.score);

            tbody.innerHTML = '';
            data.forEach((d, i) => {
                const isMe = d.name === state.player;
                tbody.innerHTML += `
                    <tr style="${isMe ? 'background:rgba(59,130,246,0.15); font-weight:600;' : ''}">
                        <td>${i+1}</td>
                        <td>${d.name}${isMe ? ' ⭐' : ''}</td>
                        <td style="color:var(--primary); font-weight:700;">${d.score}</td>
                    </tr>`;
            });
        } catch(err) {
            console.error("Load error:", err);
            tbody.innerHTML = `<tr><td colspan="3">⚠️ ${err.message}</td></tr>`;
        }
    }

    // 🎯 Initialize
    document.addEventListener('DOMContentLoaded', () => {
        renderBoard();
        // Set default player name
        const savedName = localStorage.getItem('ttt_player');
        if(savedName) document.getElementById('playerName').value = savedName;
    });

    // Save player name on change
    document.getElementById('playerName').addEventListener('change', (e) => {
        localStorage.setItem('ttt_player', e.target.value.trim());
    });

    // Prevent accidental page refresh
    window.addEventListener('beforeunload', (e) => {
        if(state.sessionActive && state.round > 1) {
            e.preventDefault();
            e.returnValue = '';
        }
    });
</script>
</body>
</html>
