<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tic Tac Toe - EKA SIR</title>
    <style>
        body {
          font-family: 'Segoe UI', sans-serif;
          background: linear-gradient(135deg, #87CEEB, #98FF98);
          text-align: center;
          padding: 20px;
          margin: 0;
          height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
        }

        .glass-panel {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        h1 { margin-top: 0; color: #1a5f7a; }

        .board {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          grid-gap: 12px;
          margin: 20px 0;
        }

        .cell {
          aspect-ratio: 1/1;
          font-size: 48px;
          background: rgba(255, 255, 255, 0.4);
          border: 1px solid rgba(255, 255, 255, 0.6);
          border-radius: 15px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          user-select: none;
          color: #1a5f7a;
        }

        .cell:active {
          transform: scale(0.95);
          background: rgba(255, 255, 255, 0.6);
        }

        .scoreboard {
          display: flex;
          justify-content: space-around;
          margin-top: 10px;
          gap: 15px;
        }

        .scorebox {
          background: rgba(255, 255, 255, 0.5);
          padding: 10px;
          border-radius: 12px;
          flex: 1;
          font-weight: bold;
          color: #1a5f7a;
        }

        #drawBox {
          margin-top: 10px;
          background-color: #0078D4;
          color: white;
          padding: 10px;
          border-radius: 10px;
          display: none;
          font-weight: bold;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            width: 100%;
        }

        button {
          flex: 1;
          padding: 12px;
          font-size: 16px;
          background-color: #0078D4;
          color: white;
          border: none;
          border-radius: 10px;
          font-weight: bold;
          cursor: pointer;
          box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
        }

        .home-btn {
            background-color: #475569;
        }

        button:active {
          transform: scale(0.95);
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <h1>Tic Tac Toe</h1>

    <div class="scoreboard">
        <div class="scorebox" id="player1ScoreBox">✔️<br><span id="player1Score">0</span></div>
        <div class="scorebox" id="player2ScoreBox">⭕<br><span id="player2Score">0</span></div>
    </div>

    <div class="board" id="board"></div>

    <div id="drawBox">DRAW! ➖</div>

    <div class="btn-row">
        <button onclick="resetGame()">Reset</button>
        <button onclick="location.href='games.html'" class="home-btn">Exit</button>
    </div>
</div>

<script>
    const boardEl = document.getElementById('board');
    const player1ScoreEl = document.getElementById('player1Score');
    const player2ScoreEl = document.getElementById('player2Score');
    const drawBox = document.getElementById('drawBox');

    let board = Array(9).fill('');
    let currentPlayer = Math.random() < 0.5 ? '✔️' : '⭕';
    let player1StartsNext = currentPlayer === '⭕'; // So it flips next time
    let gameOver = false;
    let player1Score = 0;
    let player2Score = 0;

    function drawBoard() {
      boardEl.innerHTML = '';
      board.forEach((cell, index) => {
        const cellEl = document.createElement('div');
        cellEl.className = 'cell';
        cellEl.textContent = cell;
        cellEl.addEventListener('click', () => handleClick(index));
        boardEl.appendChild(cellEl);
      });
    }

    function handleClick(index) {
      if (board[index] || gameOver) return;

      board[index] = currentPlayer;
      drawBoard();
      checkWin();
      if (!gameOver) {
        currentPlayer = currentPlayer === '✔️' ? '⭕' : '✔️';
      }
    }

    function checkWin() {
      const wins = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // rows
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // cols
        [0, 4, 8], [2, 4, 6]             // diags
      ];

      for (let combo of wins) {
        const [a, b, c] = combo;
        if (board[a] && board[a] === board[b] && board[b] === board[c]) {
          gameOver = true;
          if (board[a] === '✔️') {
            player1Score++;
            player1ScoreEl.textContent = player1Score;
            saveScore('player1', player1Score);
          } else {
            player2Score++;
            player2ScoreEl.textContent = player2Score;
            saveScore('player2', player2Score);
          }
          return;
        }
      }

      if (board.every(cell => cell)) {
        gameOver = true;
        drawBox.style.display = 'block'; // show draw box
      }
    }

    function saveScore(player, score) {
        localStorage.setItem('eka_score_tictactoe_' + player, score);
    }

    function loadScores() {
        player1Score = parseInt(localStorage.getItem('eka_score_tictactoe_player1')) || 0;
        player2Score = parseInt(localStorage.getItem('eka_score_tictactoe_player2')) || 0;
        player1ScoreEl.textContent = player1Score;
        player2ScoreEl.textContent = player2Score;
    }

    function resetGame() {
      board = Array(9).fill('');
      drawBox.style.display = 'none';
      gameOver = false;

      // Alternate starting player
      player1StartsNext = !player1StartsNext;
      currentPlayer = player1StartsNext ? '✔️' : '⭕';

      drawBoard();
    }

    loadScores();
    drawBoard();
</script>
</body>
</html>
