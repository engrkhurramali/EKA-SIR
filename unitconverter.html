<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#a8edea">
    <title>EKA Unit Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg-grad: linear-gradient(135deg, #a8edea 0%, #b5f0e0 50%, #88d8c0 100%);
          --glass-bg: rgba(255, 255, 255, 0.32);
          --glass-border: rgba(255, 255, 255, 0.65);
          --glass-shadow: 0 8px 32px rgba(0, 70, 60, 0.12);
          --text-main: #004d40;
          --text-sub: #00695c;
          --accent: #00897b;
          --accent-light: #4db6ac;
          --success: #00b894;
          --danger: #ff6b6b;
          --warning: #ffb74d;
          --radius: 16px;
          --nav-h: 75px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-grad);
            background-size: 100% 200%;
            animation: bgFloat 20s ease infinite;
            color: var(--text-main);
            height: 100vh; height: 100dvh;
            width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }

        @keyframes bgFloat {
          0% { background-position: 0% 0%; }
          50% { background-position: 0% 100%; }
          100% { background-position: 0% 0%; }
        }

        .app-container {
          width: 100vw; max-width: 450px;
          height: 100vh; height: 100dvh;
          aspect-ratio: 9 / 16;
          margin: 0 auto;
          overflow: hidden; display: flex; flex-direction: column;
          background: rgba(255,255,255,0.12);
          backdrop-filter: blur(14px);
          border-radius: var(--radius);
          box-shadow: 0 12px 35px rgba(0,0,0,0.18);
          border: 1px solid var(--glass-border);
        }

        header {
          padding: 10px 16px 6px; text-align: center; flex-shrink: 0;
          background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
        }
        header h1 { font-size: clamp(1rem, 4vw, 1.3rem); font-weight: 800; letter-spacing: 0.5px; }
        .stats-row {
          display: flex; justify-content: space-around; align-items: center;
          margin-top: 6px; font-size: 0.85rem; font-weight: 700; color: var(--text-sub);
        }
        .stat-badge { background: var(--glass-bg); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--glass-border); white-space: nowrap; }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        /* Professional Mobile Input Cards */
        .unit-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }

        .unit-card:focus-within {
            background: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .unit-label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-sub);
            width: 35%;
        }

        .input-wrapper { width: 65%; text-align: right; }

        input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            text-align: right;
            outline: none;
            font-weight: 700;
        }

        input::placeholder { color: rgba(0, 77, 64, 0.3); }

        /* Bottom Category Navigation */
        .bottom-nav {
            background: rgba(255,255,255,0.65);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            padding: 12px 12px calc(env(safe-area-inset-bottom) + 8px);
            display: flex;
            overflow-x: auto;
            white-space: nowrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .bottom-nav::-webkit-scrollbar { display: none; }

        .cat-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.3);
            color: var(--text-sub);
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        .cat-btn.active {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 137, 123, 0.3);
            transform: scale(1.05);
        }

        .cat-icon { font-size: 1.2rem; margin-bottom: 2px; }

    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>EKA Unit Pro</h1>
        <div class="stats-row">
            <span class="stat-badge" id="disp-level">CAT: LENGTH</span>
            <span class="stat-badge" id="disp-score">CONVERSIONS: 0</span>
        </div>
    </header>

    <main id="unitList">
        <!-- Unit cards will be rendered here -->
    </main>

    <nav class="bottom-nav" id="catBar">
        <!-- Category buttons will be rendered here -->
    </nav>
</div>

<script>
    const conversionData = {
        Length: {
            icon: '📏',
            units: { m: 1, km: 0.001, cm: 100, mm: 1000, inch: 39.3701, ft: 3.28084, yard: 1.09361, mile: 0.000621371 }
        },
        Weight: {
            icon: '⚖️',
            units: { kg: 1, g: 1000, mg: 1000000, lb: 2.20462, oz: 35.274, ton: 0.001 }
        },
        Pressure: {
            icon: '🎈',
            units: { pa: 1, bar: 0.00001, psi: 0.000145038, atm: 0.0000098692, mmhg: 0.00750062 }
        },
        Temperature: {
            icon: '🌡️',
            units: { celsius: 1, kelvin: 1, fahrenheit: 1, rankine: 1 }
        }
    };

    let activeCat = 'Length';
    let conversionCount = 0;

    function updateStats() {
        document.getElementById('disp-level').innerText = `CAT: ${activeCat.toUpperCase()}`;
        document.getElementById('disp-score').innerText = `CONVERSIONS: ${conversionCount}`;
    }

    function fmt(n) {
        if (n === 0) return "0";
        let absN = Math.abs(n);
        if (absN >= 1e9 || (absN < 0.0001 && absN > 0)) return n.toExponential(4);
        return parseFloat(n.toFixed(6)).toString();
    }

    function syncAll(srcId, value) {
        const num = parseFloat(value);
        if (isNaN(num)) return;

        conversionCount++;
        updateStats();

        const units = conversionData[activeCat].units;
        let base;

        // Normalization to Base
        if (activeCat === 'Temperature') {
            if (srcId === 'celsius') base = num;
            else if (srcId === 'kelvin') base = num - 273.15;
            else if (srcId === 'fahrenheit') base = (num - 32) * 5/9;
            else base = (num - 491.67) * 5/9;
        } else {
            base = num / units[srcId];
        }

        // Update All Fields
        Object.keys(units).forEach(key => {
            if (key === srcId) return;
            let res;
            if (activeCat === 'Temperature') {
                if (key === 'celsius') res = base;
                else if (key === 'kelvin') res = base + 273.15;
                else if (key === 'fahrenheit') res = (base * 9/5) + 32;
                else res = (base + 273.15) * 9/5;
            } else {
                res = base * units[key];
            }
            document.getElementById(key).value = fmt(res);
        });

        if (navigator.vibrate) navigator.vibrate(5);
    }

    function render() {
        const list = document.getElementById('unitList');
        list.innerHTML = '';

        Object.keys(conversionData[activeCat].units).forEach(key => {
            const card = document.createElement('div');
            card.className = 'unit-card';
            card.innerHTML = `
                <div class="unit-label">${key}</div>
                <div class="input-wrapper">
                    <input type="number" inputmode="decimal" id="${key}" placeholder="0">
                </div>
            `;
            list.appendChild(card);
        });

        // Add input listeners
        list.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', (e) => syncAll(e.target.id, e.target.value));
        });

        // Render Categories
        const bar = document.getElementById('catBar');
        bar.innerHTML = '';
        Object.keys(conversionData).forEach(cat => {
            const btn = document.createElement('div');
            btn.className = `cat-btn ${cat === activeCat ? 'active' : ''}`;
            btn.innerHTML = `<span class="cat-icon">${conversionData[cat].icon}</span><span>${cat}</span>`;
            btn.onclick = () => {
                activeCat = cat;
                render();
                updateStats();
                if (navigator.vibrate) navigator.vibrate(10);
            };
            bar.appendChild(btn);
        });
    }

    // Prevent multi-touch zoom and other mobile gestures
    document.addEventListener('touchstart', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

    render();
    updateStats();
</script>
</body>
</html>
