<!DOCTYPE html>
<html lang="en" data-theme="3d-glass">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#a8edea">
    <title>EKA WordGuess</title>
    <style>
        /* ========== THEME VARIABLES ========== */
        :root, [data-theme="3d-glass"] {
            --bg-grad: linear-gradient(160deg, #e0e7ff 0%, #dbeafe 100%);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.7);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --text-main: #1e293b;
            --text-sub: #475569;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --cell-bg: rgba(255,255,255,0.7);
        }

        [data-theme="modern-2x2"] {
            --bg-grad: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #44403c;
            --text-sub: #78716c;
            --accent: #fb923c;
            --danger: #ef4444;
            --success: #22c55e;
            --cell-bg: rgba(255,255,255,0.6);
        }

        [data-theme="dark-neon"] {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(148, 163, 184, 0.2);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --accent: #60a5fa;
            --danger: #f43f5e;
            --success: #34d399;
            --cell-bg: rgba(51, 65, 85, 0.9);
        }

        [data-theme="midnight-dark"] {
            --bg-grad: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --glass-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f1f5f9;
            --text-sub: #94a3b8;
            --accent: #38bdf8;
            --danger: #ef4444;
            --success: #22c55e;
            --cell-bg: rgba(30, 41, 59, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
          font-family: system-ui, -apple-system, sans-serif;
          background: var(--bg-grad);
          background-size: 100% 200%;
          animation: bgFloat 20s ease infinite;
          color: var(--text-main);
          height: 100vh; height: 100dvh;
          width: 100vw;
          display: flex; justify-content: center; align-items: center;
          overflow: hidden; touch-action: manipulation;
        }

        @keyframes bgFloat { 0% { background-position: 0% 0%; } 50% { background-position: 0% 100%; } 100% { background-position: 0% 0%; } }

        .app-container {
          width: 100vw; max-width: 480px;
          height: 100vh; height: 100dvh;
          display: flex; flex-direction: column;
          background: rgba(255,255,255,0.05);
          backdrop-filter: blur(15px);
          border-radius: 16px;
          box-shadow: 0 12px 35px rgba(0,0,0,0.2);
          border: 1px solid var(--glass-border);
          position: relative;
        }

        header {
          padding: 10px 12px; text-align: center; flex-shrink: 0;
          background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
          border-bottom: 1px solid var(--glass-border);
          position: relative;
        }
        header h1 { font-size: 1.2rem; font-weight: 800; }

        .back-btn {
            position: absolute; left: 10px; top: 10px;
            text-decoration: none; background: rgba(255,255,255,0.3);
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; color: var(--text-main); font-weight: bold; border: 1px solid var(--glass-border);
        }

        .screens-wrapper { flex: 1; position: relative; overflow: hidden; display: flex; width: 100%; }
        .screen {
          position: absolute; inset: 0; padding: 10px;
          display: none; flex-direction: column; gap: 15px;
          animation: slideIn 0.3s ease forwards;
          overflow-y: auto; align-items: center;
          width: 100%;
        }
        .screen.active { display: flex; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
          background: var(--glass-bg); border: 1px solid var(--glass-border);
          border-radius: 20px; padding: 15px;
          box-shadow: var(--glass-shadow);
          display: flex; flex-direction: column; align-items: center; gap: 15px;
          width: 98%;
        }

        .input-glass {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.2);
            color: var(--text-main); font-size: 1rem;
            outline: none; text-align: center; font-weight: 600;
        }

        .btn {
          min-height: 50px; width: 100%; padding: 0 20px;
          font-size: 1rem; font-weight: 700; border: none; border-radius: 12px;
          background: var(--cell-bg); color: var(--text-main);
          cursor: pointer; transition: all 0.2s;
          display: inline-flex; align-items: center; justify-content: center; gap: 8px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn.primary { background: var(--accent); color: white; }
        .btn:active { transform: scale(0.96); }

        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-weight: 700; color: var(--text-sub); width: 100%; margin-top: 5px; }
        .timer-container { flex: 1; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; margin: 0 10px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: var(--success); transition: width 1s linear; }
        .stat-badge { background: var(--glass-bg); padding: 4px 10px; border-radius: 20px; white-space: nowrap; border: 1px solid var(--glass-border); }

        /* Word Display: 98% Width */
        .word-display {
            display: flex; flex-wrap: nowrap; justify-content: center;
            gap: 4px; min-height: 60px; width: 98%; margin: 10px 0;
        }
        .letter-box {
            flex: 1; height: 60px; background: var(--cell-bg); border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.2rem, 8vw, 2.2rem); font-weight: 800; color: var(--accent);
            border: 2px solid var(--glass-border); transition: all 0.3s;
        }
        .letter-box.revealed { background: rgba(16, 185, 129, 0.2); border-color: var(--success); color: var(--success); }
        .letter-box.empty { color: transparent; border-style: dashed; }

        /* Keyboard: 5 rows, Centered, 98% Width */
        .alpha-grid {
            display: flex; flex-direction: column; gap: 8px;
            width: 98%; padding-bottom: 10px; margin-top: auto;
        }
        .keyboard-row { display: flex; justify-content: center; gap: 6px; width: 100%; }
        .alpha-btn {
            flex: 1; min-height: 52px; border-radius: 12px;
            background: var(--cell-bg); font-size: 1.2rem; font-weight: 800;
            border: 1px solid var(--glass-border); cursor: pointer; color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .alpha-btn.hit { background: var(--success) !important; color: white !important; border-color: transparent; }
        .alpha-btn.miss { background: var(--danger) !important; color: white !important; border-color: transparent; }
        .alpha-btn.disabled { opacity: 0.5; pointer-events: none; }

        .wrong-tracker { display: flex; gap: 6px; justify-content: center; width: 100%; margin-bottom: 5px; }
        .wrong-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(0,0,0,0.1); border: 1px solid var(--glass-border); }
        .wrong-dot.filled { background: var(--danger); transform: scale(1.1); box-shadow: 0 0 8px var(--danger); }

        .modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--glass-bg); padding: 30px; border-radius: 24px; text-align: center; width: 85%; border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }

        .leaderboard {
            width: 100%; max-height: 50vh; overflow-y: auto; background: rgba(255,255,255,0.1);
            border-radius: 15px; border: 1px solid var(--glass-border);
            -webkit-overflow-scrolling: touch;
        }
        .leaderboard table { width: 100%; border-collapse: collapse; }
        .leaderboard th, .leaderboard td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .leaderboard th { font-weight: 800; color: var(--accent); background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="index.html" class="back-btn">⬅</a>
        <h1>EKA WordGuess</h1>
        <div id="game-stats-container" style="display:none; padding: 0 10px;">
            <div class="stats-row">
                <span class="stat-badge" id="disp-timer">⏱️ 60s</span>
                <div class="timer-container"><div id="timer-bar"></div></div>
                <span class="stat-badge" id="disp-level">Stage 1</span>
                <span class="stat-badge" id="disp-score">🌟 0</span>
            </div>
        </div>
    </header>

    <div class="screens-wrapper">
        <section id="screen-welcome" class="screen active">
            <div style="font-size: 2.2rem; font-weight: 900; color: var(--accent); text-align: center; margin: 20px 0;">GUESS WORD</div>
            <div class="glass-card">
                <input type="text" id="playerName" class="input-glass" placeholder="Enter Your Name" maxlength="12">
                <select id="age-select" class="input-glass">
                    <option value="Age < 10">Easy (Child)</option>
                    <option value="Age 10-15" selected>Medium (Standard)</option>
                    <option value="Age 15-20">Difficult (Teen)</option>
                    <option value="Age 20-30">Expert</option>
                    <option value="Age 30+">Master</option>
                </select>
                <select id="theme-select" class="input-glass" onchange="setTheme(this.value)">
                    <option value="3d-glass">🎨 3D Glass</option>
                    <option value="modern-2x2">🎨 Modern Orange</option>
                    <option value="dark-neon">🎨 Dark Neon</option>
                    <option value="midnight-dark">🎨 Midnight</option>
                </select>
                <button class="btn primary" onclick="startGame()">▶ START GAME</button>
                <button class="btn" onclick="showLeaderboard('top')">🏆 LEADERBOARD</button>
            </div>
        </section>

        <section id="screen-game" class="screen">
            <div class="glass-card">
                <div class="wrong-tracker" id="wrong-tracker"></div>
                <div class="word-display" id="word-display"></div>
                <div id="game-msg" style="font-size: 0.8rem; font-weight: 800; opacity: 0.7;">First letter revealed!</div>
            </div>

            <div class="alpha-grid" id="alpha-grid"></div>

            <div style="width:100%; display:flex; gap:10px; padding: 0 5px;">
                <button class="btn" style="flex:1; min-height: 44px; font-size: 0.9rem;" onclick="revealWordHint()">👁️ HINT (-10s)</button>
                <button class="btn" style="flex:1; min-height: 44px; font-size: 0.9rem;" onclick="endGame(false)">🏳️ GIVE UP</button>
            </div>
        </section>

        <section id="screen-leaderboard" class="screen">
            <h2 style="margin: 10px 0;">🏆 Global Rankings</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 10px; width: 98%;">
                <button class="btn" style="flex: 1; min-height: 40px; font-size: 0.8rem;" id="btnTop15" onclick="showLeaderboard('top')">Top 15</button>
                <button class="btn" style="flex: 1; min-height: 40px; font-size: 0.8rem; opacity: 0.6;" id="btnRecent60" onclick="showLeaderboard('recent')">Recent 60</button>
            </div>
            <div class="leaderboard">
                <table>
                    <thead><tr><th>Player</th><th>Score</th><th>Date</th></tr></thead>
                    <tbody id="leaderboardBody"></tbody>
                </table>
            </div>
            <button class="btn primary" style="margin-top: 15px;" onclick="navTo('screen-welcome')">Back to Menu</button>
        </section>
    </div>

    <div class="modal-overlay" id="modal-end">
        <div class="modal-box">
            <h2 id="modal-title">Game Over</h2>
            <p id="modal-msg"></p>
            <button class="btn primary" id="btn-modal-action"></button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="vocabulary.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAEcPKE7n33wNUGxYpyqm5UWFjwXTT_x_c",
        authDomain: "eka-sir.firebaseapp.com",
        databaseURL: "https://eka-sir-default-rtdb.firebaseio.com",
        projectId: "eka-sir",
        storageBucket: "eka-sir.firebasestorage.app",
        messagingSenderId: "1022804634776",
        appId: "1:1022804634776:web:4c547efa80d625885734ed"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let state = {
        name: "", level: "Age 8-12", score: 0, stage: 1,
        word: "", guessed: new Set(), wrong: 0, maxWrong: 10,
        time: 60, maxTime: 60, interval: null, active: false
    };

    const LEVEL_TIME = { "Age < 8": 90, "Age 8-12": 60, "Age 12-16": 45, "Age 16-20": 35, "Age 20+": 30 };

    function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('eka_wordguess_theme', theme);
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('game-stats-container').style.display = (id === 'screen-game') ? 'block' : 'none';
    }

    function startGame() {
        const name = document.getElementById('playerName').value.trim();
        if (!name) { alert("Please enter your name!"); return; }
        state.name = name;
        state.level = document.getElementById('age-select').value;
        state.score = 0; state.stage = 1;
        localStorage.setItem('eka_player_name', name);
        newRound();
        navTo('screen-game');
    }

    function newRound() {
        clearInterval(state.interval);
        const dict = window.VOCABULARY[state.level] || window.VOCABULARY["Age 8-12"];
        state.word = dict[Math.floor(Math.random() * dict.length)].toUpperCase();
        state.guessed = new Set();
        state.wrong = 0;
        state.maxTime = Math.max(20, (LEVEL_TIME[state.level] || 60) - (state.stage * 2));
        state.time = state.maxTime;
        state.active = true;

        document.getElementById('disp-level').textContent = `Stage ${state.stage}`;
        document.getElementById('disp-score').textContent = `🌟 ${state.score}`;
        document.getElementById('word-display').innerHTML = state.word.split('').map(() => '<div class="letter-box empty"></div>').join('');

        buildKeyboard();
        updateTracker();
        updateTimerUI();

        // REVEAL FIRST LETTER AUTOMATICALLY
        handleGuess(state.word[0], true);

        state.interval = setInterval(() => {
            if (!state.active) return;
            state.time--;
            updateTimerUI();
            if (state.time <= 0) endGame(false);
        }, 1000);
    }

    function buildKeyboard() {
        const grid = document.getElementById('alpha-grid');
        grid.innerHTML = '';

        // 5-Row Layout
        const layout = [
            "ABCDEF".split(''),
            "GHIJKL".split(''),
            "MNOPQ".split(''),
            "RSTUV".split(''),
            "WXYZ".split('')
        ];

        layout.forEach(rowChars => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'keyboard-row';
            rowChars.forEach(char => {
                const btn = document.createElement('button');
                btn.className = 'alpha-btn';
                btn.textContent = char;
                btn.id = `key-${char}`;
                btn.onclick = () => handleGuess(char);
                rowDiv.appendChild(btn);
            });
            grid.appendChild(rowDiv);
        });
    }

    function handleGuess(char, isAuto = false) {
        if (!state.active || (state.guessed.has(char) && !isAuto)) return;
        state.guessed.add(char);

        const btn = document.getElementById(`key-${char}`);
        if (btn) btn.classList.add('disabled');

        if (state.word.includes(char)) {
            if (btn) btn.classList.add('hit');
            revealPositions(char);
            if (![...state.word].some(c => !state.guessed.has(c))) {
                setTimeout(() => endGame(true), 400);
            }
        } else if (!isAuto) {
            if (btn) btn.classList.add('miss');
            state.wrong++;
            updateTracker();
            if (state.wrong >= state.maxWrong) endGame(false);
        }
    }

    function revealPositions(char) {
        const boxes = document.getElementById('word-display').children;
        state.word.split('').forEach((c, i) => {
            if (c === char) {
                boxes[i].textContent = char;
                boxes[i].classList.remove('empty');
                boxes[i].classList.add('revealed');
            }
        });
    }

    function updateTracker() {
        const tracker = document.getElementById('wrong-tracker');
        tracker.innerHTML = Array(state.maxWrong).fill(0).map((_, i) =>
            `<div class="wrong-dot ${i < state.wrong ? 'filled' : ''}"></div>`
        ).join('');
    }

    function updateTimerUI() {
        document.getElementById('disp-timer').textContent = `⏱️ ${state.time}s`;
        const pct = (state.time / state.maxTime) * 100;
        document.getElementById('timer-bar').style.width = pct + '%';
        document.getElementById('timer-bar').style.background = pct < 25 ? 'var(--danger)' : 'var(--success)';
    }

    function endGame(won) {
        state.active = false;
        clearInterval(state.interval);
        const modal = document.getElementById('modal-end');
        const title = document.getElementById('modal-title');
        const msg = document.getElementById('modal-msg');
        const actionBtn = document.getElementById('btn-modal-action');

        if (won) {
            const points = (state.word.length * 5) + state.time;
            state.score += points;
            title.textContent = "Word Found! 🎉";
            msg.textContent = `Word: ${state.word}\nPoints: ${points}\nTotal: ${state.score}`;
            actionBtn.textContent = "Next Stage";
            actionBtn.onclick = () => { modal.classList.remove('active'); state.stage++; newRound(); };
        } else {
            title.textContent = "Game Over! ⏰";
            msg.textContent = `The word was: ${state.word}\nFinal Score: ${state.score}`;
            actionBtn.textContent = "Return to Menu";
            actionBtn.onclick = () => { modal.classList.remove('active'); navTo('screen-welcome'); };
            saveToLeaderboard();
        }
        modal.classList.add('active');
    }

    function saveToLeaderboard() {
        if (state.score <= 0) return;
        db.ref('scores_guessword').push({
            name: state.name,
            score: state.score,
            level: state.level,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function showLeaderboard(mode = 'top') {
        navTo('screen-leaderboard');
        const body = document.getElementById('leaderboardBody');
        const btnTop = document.getElementById('btnTop15');
        const btnRecent = document.getElementById('btnRecent60');

        if (mode === 'top') {
            btnTop.style.opacity = '1'; btnRecent.style.opacity = '0.6';
        } else {
            btnTop.style.opacity = '0.6'; btnRecent.style.opacity = '1';
        }

        body.innerHTML = '<tr><td colspan="3">Syncing...</td></tr>';

        let q = db.ref('scores_guessword');
        if (mode === 'top') {
            q = q.orderByChild('score').limitToLast(15);
        } else {
            q = q.limitToLast(60);
        }

        q.once('value', s => {
            let l = [];
            s.forEach(c => {
                let data = c.val();
                data.key = c.key;
                l.push(data);
            });

            if (mode === 'top') {
                l.sort((a, b) => b.score - a.score);
            } else {
                l.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            }

            body.innerHTML = l.length ? l.map((s, i) => {
                const date = s.timestamp ? new Date(s.timestamp).toLocaleDateString() : 'N/A';
                return `
                <tr>
                    <td><b>${s.name}</b><br><small>${s.level}</small></td>
                    <td style="font-weight:bold;color:var(--accent)">${s.score}</td>
                    <td style="font-size: 0.7rem; opacity: 0.7;">${date}</td>
                </tr>`;
            }).join('') : '<tr><td colspan="3">No records.</td></tr>';
        });
    }

    function revealWordHint() {
        if (!state.active) return;
        const u = state.word.split('').filter(c => !state.guessed.has(c));
        if (u.length > 1) { state.time = Math.max(1, state.time - 10); handleGuess(u[Math.floor(Math.random() * u.length)]); updateTimerUI(); }
        else { state.word.split('').forEach(c => revealPositions(c)); setTimeout(() => endGame(false), 500); }
    }

    window.onload = () => {
        const sn = localStorage.getItem('eka_player_name'); if (sn) document.getElementById('playerName').value = sn;
        const st = localStorage.getItem('eka_wordguess_theme'); if (st) setTheme(st);
    };
</script>
</body>
</html>
