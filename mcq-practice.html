<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <title>EKA - MCQ PRACTICE</title>
    <style>
        :root {
          --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --text-muted: #64748b;
          --primary: #3b82f6; --primary-hover: #2563eb; --correct: #22c55e; --wrong: #ef4444;
          --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius: 12px;
          --font: system-ui, -apple-system, sans-serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 15 THEMES */
        [data-theme="3d-glass"] { --bg: #e0e7ff; --surface: rgba(255,255,255,0.65); --border: rgba(255,255,255,0.4); --shadow: 0 8px 32px rgba(31,38,135,0.15); backdrop-filter: blur(12px); }
        [data-theme="neumorphic-soft"] { --bg: #e0e0e0; --surface: #e0e0e0; --text: #4a4a4a; --border: transparent; --shadow: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff; --radius: 16px; }
        [data-theme="neumorphic-pressed"] { --bg: #e0e0e0; --surface: #e0e0e0; --shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; --radius: 12px; }
        [data-theme="modern-2x2"] { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --primary: #06b6d4; --radius: 8px; }
        [data-theme="vibrant-gradient"] { --bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feada6 100%); --surface: #fff; --primary: #ff4757; --radius: 20px; }
        [data-theme="industrial-steel"] { --bg: #1e293b; --surface: #334155; --text: #e2e8f0; --primary: #3b82f6; --border: #475569; --radius: 4px; }
        [data-theme="dark-neon"] { --bg: #0a0a0a; --surface: #111; --text: #00ff9d; --primary: #00ff9d; --border: #00ff9d; --shadow: 0 0 15px #00ff9d44; }
        [data-theme="paper-sketch"] { --bg: #fdfbf7; --surface: #fff; --text: #333; --border: #333; --radius: 2px; --font: 'Courier New', monospace; --shadow: 2px 3px 0 #333; }
        [data-theme="royal-gold"] { --bg: #0f172a; --surface: #1e1b4b; --text: #fde047; --primary: #f59e0b; --border: #fbbf24; }
        [data-theme="retro-8bit"] { --bg: #21252b; --surface: #3a3f4b; --text: #abb2bf; --primary: #98c379; --border: #5c6370; --radius: 0; --font: monospace; }
        [data-theme="hacker-terminal"] { --bg: #000; --surface: #000; --text: #00ff00; --primary: #00ff00; --border: #00ff00; --font: monospace; }
        [data-theme="pastel-dream"] { --bg: #fff0f5; --surface: #ffe4e1; --text: #5c5470; --primary: #b8a9c9; --border: #d8bfd8; }
        [data-theme="minimalist-mono"] { --bg: #fff; --surface: #fff; --text: #000; --primary: #000; --border: #000; --radius: 0; }
        [data-theme="translucent-frosted"] { --bg: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%); --surface: rgba(255,255,255,0.8); --border: rgba(255,255,255,0.5); --shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        [data-theme="sky-high"] { --bg: linear-gradient(to bottom, #87ceeb, #ffffff); --surface: rgba(255,255,255,0.9); --primary: #0077b6; --radius: 18px; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
          font-family: var(--font); background: var(--bg); color: var(--text);
          height: 100vh; display: flex; flex-direction: column; overflow: hidden;
          transition: background var(--transition);
        }

        header {
          background: var(--surface); padding: 10px; box-shadow: var(--shadow);
          display: flex; flex-direction: column; gap: 8px; z-index: 10;
        }
        .top-row { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1rem; font-weight: 800; }

        .controls-row { display: flex; gap: 6px; align-items: center; }
        #search-box {
          flex: 1; padding: 8px 12px; border: 2px solid var(--border); border-radius: var(--radius);
          background: var(--bg); color: var(--text); font-size: 0.85rem;
        }

        #mcq-container {
          flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
          padding: 15px; perspective: 1000px; overflow: hidden;
        }

        .question-card {
          width: 100%; max-width: 500px; background: var(--surface);
          border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow);
          display: flex; flex-direction: column; gap: 15px;
          position: absolute; transition: transform 0.4s ease, opacity 0.4s ease;
          opacity: 0; pointer-events: none; transform: translateX(100%);
        }
        .question-card.active { opacity: 1; pointer-events: all; transform: translateX(0); }
        .question-card.prev { transform: translateX(-100%); }

        .q-text { font-size: 1.1rem; font-weight: 700; line-height: 1.4; color: var(--text); }
        .q-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; display: flex; justify-content: space-between; }

        .options { display: grid; gap: 10px; }
        .option {
          display: flex; align-items: center; gap: 12px; padding: 14px;
          border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
          transition: all 0.2s; background: var(--surface); font-size: 1rem;
        }
        .option.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 10%, transparent); }
        .option.correct { border-color: var(--correct); background: color-mix(in srgb, var(--correct) 15%, transparent); }
        .option.wrong { border-color: var(--wrong); background: color-mix(in srgb, var(--wrong) 12%, transparent); }

        .radio-dot {
          width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
          position: relative; flex-shrink: 0;
        }
        .option.selected .radio-dot { border-color: var(--primary); }
        .option.selected .radio-dot::after { content: ''; position: absolute; inset: 3px; background: var(--primary); border-radius: 50%; }
        .option.correct .radio-dot::after { background: var(--correct); }
        .option.wrong .radio-dot::after { background: var(--wrong); }

        .slide-nav {
          display: flex; align-items: center; justify-content: space-between;
          padding: 15px; background: var(--surface); border-top: 1px solid var(--border);
          gap: 10px;
        }
        .slide-nav button {
          flex: 1; padding: 12px; border: none; border-radius: var(--radius);
          background: var(--primary); color: white; font-weight: 700; font-size: 1rem;
          box-shadow: 0 4px 0 color-mix(in srgb, var(--primary) 80%, black);
        }
        .slide-nav button:active { transform: translateY(2px); box-shadow: none; }
        .slide-nav button:disabled { background: var(--border); box-shadow: none; opacity: 0.5; }

        .jump-box {
          display: flex; align-items: center; gap: 5px; font-size: 0.9rem; font-weight: 700;
        }
        .jump-box input {
          width: 50px; padding: 5px; border: 1px solid var(--border); border-radius: 5px; text-align: center;
        }

        .loading { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 5; }

        @media (max-width: 480px) {
            .question-card { height: auto; max-height: 80vh; overflow-y: auto; }
        }
    </style>
</head>
<body data-theme="modern-2x2">

<header>
    <div class="top-row">
        <h1 id="subject-title">EKA MCQ PRACTICE</h1>
        <select id="theme-selector">
            <option value="3d-glass">3D Glass</option>
            <option value="modern-2x2" selected>Modern 2x2</option>
            <option value="dark-neon">Dark Neon</option>
            <option value="sky-high">Sky High</option>
            <option value="paper-sketch">Paper Sketch</option>
        </select>
    </div>
    <div class="controls-row">
        <input type="search" id="search-box" placeholder="🔍 Find Question...">
        <div id="auto-next-ctrl" style="display: flex; align-items: center; gap: 4px; background: var(--bg); padding: 5px 8px; border-radius: var(--radius); border: 1px solid var(--border); font-size: 0.75rem; font-weight: 700; color: var(--text);">
            <input type="checkbox" id="auto-next-check" style="width: 15px; height: 15px; cursor: pointer;">
            <label for="auto-next-check" style="cursor: pointer; user-select: none;">Auto</label>
            <input type="number" id="auto-next-delay" value="3500" min="500" max="10000" step="500" style="width: 50px; border: none; background: transparent; color: var(--text); text-align: center; font-weight: 800; font-family: inherit;">
            <span style="opacity: 0.6; font-size: 0.65rem;">ms</span>
        </div>
        <button id="toggle-answers" style="padding: 8px; font-size: 0.8rem; min-width: 100px;">Show Answers</button>
    </div>
</header>

<main id="mcq-container">
    <div class="loading">Initializing...</div>
</main>

<nav class="slide-nav">
    <button id="prev-btn">⬅ PREV</button>
    <div class="jump-box">
        <span id="counter">0/0</span>
        <input type="number" id="jump-input" placeholder="Go">
    </div>
    <button id="next-btn">NEXT ➡</button>
</nav>

<script src="quiz_data_kg1.js"></script>
<script src="quiz_data_kg2.js"></script>
<script src="quiz_data_class1.js"></script>
<script src="quiz_data_class2.js"></script>
<script src="quiz_data_class3.js"></script>
<script src="quiz_data_class4.js"></script>
<script src="quiz_data_class5.js"></script>
<script src="quiz_data_class6.js"></script>
<script src="quiz_data_class7.js"></script>
<script src="quiz_data_class8.js"></script>
<script src="quiz_data_class9.js"></script>
<script src="quiz_data_class10.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const subjectParam = params.get('subject') || 'physics9';
    let mcqData = [];
    let filteredData = [];
    let currentIndex = 0;
    let autoNextTimeout = null;
    let answersRevealed = true;
    let userAnswers = {};

    const container = document.getElementById('mcq-container');
    const counterDisplay = document.getElementById('counter');
    const jumpInput = document.getElementById('jump-input');
    const subjectTitle = document.getElementById('subject-title');

    function initData() {
        if (!window.QUIZ_DATA) return;
        const keys = Object.keys(QUIZ_DATA).filter(k => k === subjectParam || (k.startsWith(subjectParam + "_") && !subjectParam.includes('_u')));

        let combinedTsv = "";
        keys.forEach(k => combinedTsv += (combinedTsv ? "\n" : "") + QUIZ_DATA[k].tsv.trim());

        if (combinedTsv) {
            mcqData = combinedTsv.split('\n').map(line => {
                const p = line.split('\t');
                if (p.length < 6) return null;
                const [q, a, b, c, d, ans] = p;
                let correct = ans.trim();
                if (correct === 'A') correct = a.trim();
                else if (correct === 'B') correct = b.trim();
                else if (correct === 'C') correct = c.trim();
                else if (correct === 'D') correct = d.trim();
                return { q: q.trim(), A: a.trim(), B: b.trim(), C: c.trim(), D: d.trim(), correct: correct };
            }).filter(x => x !== null);
        }
        filteredData = [...mcqData];
        subjectTitle.innerText = `EKA - ${subjectParam.toUpperCase()}`;
    }

    function setupSwipe(card) {
        let startX = 0;
        card.ontouchstart = e => startX = e.touches[0].clientX;
        card.ontouchend = e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentIndex < filteredData.length - 1) renderSlide(currentIndex + 1);
                else if (diff < 0 && currentIndex > 0) renderSlide(currentIndex - 1);
            }
        };
    }

    function renderSlide(index) {
        if (filteredData.length === 0) {
            container.innerHTML = '<div style="color:white; padding: 20px;">No questions found.</div>';
            return;
        }

        // Clear any existing auto-next timer
        if (autoNextTimeout) {
            clearTimeout(autoNextTimeout);
            autoNextTimeout = null;
        }

        const oldCard = container.querySelector('.question-card.active');
        const isNewSlide = (currentIndex !== index) || !oldCard;

        if (oldCard && isNewSlide) {
            oldCard.classList.remove('active');
            oldCard.classList.add('prev');
            setTimeout(() => { if(oldCard && oldCard.parentNode && oldCard.classList.contains('prev')) oldCard.remove(); }, 400);
        } else if (!oldCard) {
            container.innerHTML = '';
        }

        // Update global index
        currentIndex = index;

        const item = filteredData[index];
        const card = (!isNewSlide && oldCard) ? oldCard : document.createElement('div');
        if (isNewSlide) card.className = 'question-card';

        card.innerHTML = `
            <div class="q-meta">
                <span>QUESTION ${index + 1} OF ${filteredData.length}</span>
                <span>ID: ${index + 1}</span>
            </div>
            <div class="q-text">${item.q}</div>
            <div class="options"></div>
        `;

        const optsDiv = card.querySelector('.options');
        ['A', 'B', 'C', 'D'].forEach(letter => {
            const optText = item[letter];
            const div = document.createElement('div');
            div.className = 'option';
            if (userAnswers[index] === letter) div.classList.add('selected');

            if (answersRevealed) {
                if (optText === item.correct) div.classList.add('correct');
                else if (userAnswers[index] === letter) div.classList.add('wrong');
            }

            div.innerHTML = `<span class="radio-dot"></span><span><b>${letter}:</b> ${optText}</span>`;
            div.onclick = (e) => {
                e.stopPropagation();
                userAnswers[index] = letter;
                localStorage.setItem('eka-answers-' + subjectParam, JSON.stringify(userAnswers));
                renderSlide(index);
            };
            optsDiv.appendChild(div);
        });

        if (isNewSlide) {
            container.appendChild(card);
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    card.classList.add('active');
                });
            });
            setupSwipe(card);
        }

        counterDisplay.innerText = `${index + 1}/${filteredData.length}`;
        document.getElementById('prev-btn').disabled = index === 0;
        document.getElementById('next-btn').disabled = index === filteredData.length - 1;

        // Auto-next logic: Set timer if check box is checked
        const autoCheck = document.getElementById('auto-next-check');
        if (autoCheck && autoCheck.checked && index < filteredData.length - 1) {
            let delay = parseInt(document.getElementById('auto-next-delay').value) || 3500;
            delay = Math.max(500, Math.min(10000, delay));
            autoNextTimeout = setTimeout(() => {
                renderSlide(index + 1);
            }, delay);
        }
    }

    document.getElementById('auto-next-check').onchange = (e) => {
        if (e.target.checked) renderSlide(currentIndex);
        else if (autoNextTimeout) {
            clearTimeout(autoNextTimeout);
            autoNextTimeout = null;
        }
    };

    document.getElementById('next-btn').onclick = () => { if(currentIndex < filteredData.length-1) renderSlide(currentIndex + 1); };
    document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0) renderSlide(currentIndex - 1); };

    jumpInput.onchange = (e) => {
        let val = parseInt(e.target.value) - 1;
        if (val >= 0 && val < filteredData.length) renderSlide(val);
        e.target.value = '';
    };

    document.getElementById('search-box').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        filteredData = mcqData.filter(m => m.q.toLowerCase().includes(term));
        currentIndex = 0;
        renderSlide(0);
    };

    document.getElementById('toggle-answers').onclick = (e) => {
        answersRevealed = !answersRevealed;
        e.target.innerText = answersRevealed ? 'Hide Answers' : 'Show Answers';
        renderSlide(currentIndex);
    };

    document.getElementById('theme-selector').onchange = (e) => {
        document.body.setAttribute('data-theme', e.target.value);
        localStorage.setItem('eka-theme', e.target.value);
    };

    window.onload = () => {
        initData();
        const saved = localStorage.getItem('eka-answers-' + subjectParam);
        if (saved) userAnswers = JSON.parse(saved);
        const savedTheme = localStorage.getItem('eka-theme');
        if (savedTheme) {
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-selector').value = savedTheme;
        }
        renderSlide(0);
    };
</script>
</body>
</html>
