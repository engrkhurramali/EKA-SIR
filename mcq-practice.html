<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>EKA - PHYSICS CLASS 9</title>
    <style>
        :root {
          --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --text-muted: #64748b;
          --primary: #3b82f6; --primary-hover: #2563eb; --correct: #22c55e; --wrong: #ef4444;
          --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius: 12px;
          --font: system-ui, -apple-system, sans-serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 15 THEMES */
        [data-theme="3d-glass"] { --bg: #e0e7ff; --surface: rgba(255,255,255,0.65); --border: rgba(255,255,255,0.4); --shadow: 0 8px 32px rgba(31,38,135,0.15); backdrop-filter: blur(12px); }
        [data-theme="neumorphic-soft"] { --bg: #e0e0e0; --surface: #e0e0e0; --text: #4a4a4a; --border: transparent; --shadow: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff; --radius: 16px; }
        [data-theme="neumorphic-pressed"] { --bg: #e0e0e0; --surface: #e0e0e0; --shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; --radius: 12px; }
        [data-theme="modern-2x2"] { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --primary: #06b6d4; --radius: 8px; }
        [data-theme="vibrant-gradient"] { --bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feada6 100%); --surface: #fff; --primary: #ff4757; --radius: 20px; }
        [data-theme="industrial-steel"] { --bg: #1e293b; --surface: #334155; --text: #e2e8f0; --primary: #3b82f6; --border: #475569; --radius: 4px; }
        [data-theme="dark-neon"] { --bg: #0a0a0a; --surface: #111; --text: #00ff9d; --primary: #00ff9d; --border: #00ff9d; --shadow: 0 0 15px #00ff9d44; }
        [data-theme="paper-sketch"] { --bg: #fdfbf7; --surface: #fff; --text: #333; --border: #333; --radius: 2px; --font: 'Courier New', monospace; --shadow: 2px 3px 0 #333; }
        [data-theme="royal-gold"] { --bg: #0f172a; --surface: #1e1b4b; --text: #fde047; --primary: #f59e0b; --border: #fbbf24; }
        [data-theme="retro-8bit"] { --bg: #21252b; --surface: #3a3f4b; --text: #abb2bf; --primary: #98c379; --border: #5c6370; --radius: 0; --font: monospace; }
        [data-theme="hacker-terminal"] { --bg: #000; --surface: #000; --text: #00ff00; --primary: #00ff00; --border: #00ff00; --font: monospace; }
        [data-theme="pastel-dream"] { --bg: #fff0f5; --surface: #ffe4e1; --text: #5c5470; --primary: #b8a9c9; --border: #d8bfd8; }
        [data-theme="minimalist-mono"] { --bg: #fff; --surface: #fff; --text: #000; --primary: #000; --border: #000; --radius: 0; }
        [data-theme="translucent-frosted"] { --bg: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%); --surface: rgba(255,255,255,0.8); --border: rgba(255,255,255,0.5); --shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        [data-theme="sky-high"] { --bg: linear-gradient(to bottom, #87ceeb, #ffffff); --surface: rgba(255,255,255,0.9); --primary: #0077b6; --radius: 18px; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: var(--font); background: var(--bg); color: var(--text);
          min-height: 100vh; padding: 12px; transition: background var(--transition);
          display: flex; flex-direction: column; gap: 12px;
        }

        /* HEADER WITH SEARCH & CONTROLS */
        header {
          display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;
          background: var(--surface); padding: 10px; border-radius: var(--radius);
          box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; flex-direction: column; gap: 2px; }
        h1 { font-size: 1.1rem; font-weight: 700; }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); }

        .header-controls { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

        /* SEARCH BOX */
        #search-box {
          padding: 8px 12px; border: 2px solid var(--border); border-radius: var(--radius);
          background: var(--bg); color: var(--text); font-size: 0.9rem; min-width: 150px;
          transition: border-color 0.2s;
        }
        #search-box:focus { outline: none; border-color: var(--primary); }

        select, button {
          padding: 8px 12px; border: 2px solid var(--border); background: var(--surface);
          color: var(--text); border-radius: var(--radius); font-size: 0.85rem; cursor: pointer;
          transition: all var(--transition); touch-action: manipulation;
        }
        button:active { transform: scale(0.98); }
        button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        button.primary:hover { background: var(--primary-hover); }
        button.small { padding: 6px 10px; font-size: 0.8rem; }
        #clear-top { border-color: var(--wrong); color: var(--wrong); }
        #clear-top:hover { background: var(--wrong); color: #fff; }

        /* MCQ CONTAINER */
        #mcq-container {
          background: var(--surface); border-radius: var(--radius); padding: 14px;
          box-shadow: var(--shadow); flex: 1; display: flex; flex-direction: column; gap: 12px;
          transition: background var(--transition), box-shadow var(--transition);
        }
        .question-card {
          border-bottom: 1px dashed var(--border); padding-bottom: 12px; margin-bottom: 12px;
          transition: opacity 0.2s;
        }
        .question-card.hidden { display: none; }
        .q-text { font-weight: 600; margin-bottom: 10px; line-height: 1.4; font-size: 0.95rem; }
        .q-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; }

        .options { display: grid; gap: 6px; }
        .option {
          display: flex; align-items: center; gap: 8px; padding: 10px;
          border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
          transition: all 0.2s; background: var(--surface); font-size: 0.9rem;
        }
        .option:hover { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, transparent); }
        .option.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 12%, transparent); }
        .option.correct { border-color: var(--correct); background: color-mix(in srgb, var(--correct) 15%, transparent); }
        .option.wrong { border-color: var(--wrong); background: color-mix(in srgb, var(--wrong) 12%, transparent); opacity: 0.8; }
        .option input { display: none; }
        .radio-dot {
          width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border);
          position: relative; transition: all 0.2s; flex-shrink: 0;
        }
        .option.selected .radio-dot { border-color: var(--primary); }
        .option.selected .radio-dot::after {
          content: ''; position: absolute; inset: 2px; background: var(--primary); border-radius: 50%;
        }
        .option.correct .radio-dot::after { background: var(--correct); border-color: var(--correct); }
        .option.wrong .radio-dot::after { background: var(--wrong); border-color: var(--wrong); }
        .option-label { font-weight: 600; margin-right: 4px; color: var(--primary); }

        .loading { text-align: center; padding: 30px 0; color: var(--text-muted); font-style: italic; }
        .no-results { text-align: center; padding: 20px; color: var(--text-muted); font-style: italic; display: none; }

        /* FOOTER */
        footer {
          display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0;
          position: sticky; bottom: 0; background: var(--bg);
        }
        footer button { flex: 1; min-width: 100px; }

        @media (max-width: 480px) {
          body { padding: 8px; }
          header { padding: 8px; gap: 6px; }
          h1 { font-size: 1rem; }
          #search-box { min-width: 120px; }
          .option { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body data-theme="modern-2x2">
<header>
    <div class="header-left">
        <h1>EKA MCQ's - PHYSICS CLASS-9</h1>
        <div class="subtitle">QUICK REVISION FOR EXAM</div>
    </div>
    <div class="header-controls">
        <input type="search" id="search-box" placeholder="🔍 Search Q/A/B/C/D..." aria-label="Search questions">
        <select id="theme-selector" aria-label="Select UI Theme">
            <option value="3d-glass">3D Glass</option>
            <option value="neumorphic-soft">Neumorphic Soft</option>
            <option value="neumorphic-pressed">Neumorphic Pressed</option>
            <option value="modern-2x2" selected>Modern 2x2</option>
            <option value="vibrant-gradient">Vibrant Gradient</option>
            <option value="industrial-steel">Industrial Steel</option>
            <option value="dark-neon">Dark Neon</option>
            <option value="paper-sketch">Paper Sketch</option>
            <option value="royal-gold">Royal Gold</option>
            <option value="retro-8bit">Retro 8-Bit</option>
            <option value="hacker-terminal">Hacker Terminal</option>
            <option value="pastel-dream">Pastel Dream</option>
            <option value="minimalist-mono">Minimalist</option>
            <option value="translucent-frosted">Frosted Vivid</option>
            <option value="sky-high">Sky High</option>
        </select>
        <button id="toggle-answers" class="primary small">Show Answers</button>
        <button id="clear-top" class="small">🧹 Clear</button>
    </div>
</header>

<main id="mcq-container">
    <div class="loading">Loading MCQs...</div>
    <div id="no-results" class="no-results">No questions match your search 🔍</div>
</main>

<footer>
    <button id="reset-quiz">Reset Progress</button>
    <button id="export-btn">Export Answers</button>
</footer>

<script src="quiz_data_kg1.js"></script>
<script src="quiz_data_kg2.js"></script>
<script src="quiz_data_class1.js"></script>
<script src="quiz_data_class2.js"></script>
<script src="quiz_data_class3.js"></script>
<script src="quiz_data_class4.js"></script>
<script src="quiz_data_class5.js"></script>
<script src="quiz_data_class6.js"></script>
<script src="quiz_data_class7.js"></script>
<script src="quiz_data_class8.js"></script>
<script src="quiz_data_class9.js"></script>
<script src="quiz_data_class10.js"></script>
<script>
    // 📚 Dynamic Data Loading
    const params = new URLSearchParams(window.location.search);
    const subjectParam = params.get('subject') || 'physics9';
    const gradeParam = params.get('grade') || '9';

    document.querySelector('h1').innerText = `EKA - ${subjectParam.toUpperCase()}`;

    let mcqData = [];

    function initData() {
        if (window.QUIZ_DATA) {
            // Filter keys by subject prefix (e.g., "maths9" finds "maths9_u1", "maths9_u2")
            const keys = Object.keys(QUIZ_DATA).filter(k => k.startsWith(subjectParam));
            let combinedTsv = "";
            keys.forEach(k => {
                combinedTsv += (combinedTsv ? "\n" : "") + QUIZ_DATA[k].tsv.trim();
            });

            if (combinedTsv) {
                mcqData = combinedTsv.split('\n').map(line => {
                    const parts = line.split('\t');
                    if (parts.length < 6) return null;
                    const [q, a, b, c, d, ans] = parts;
                    // Handle single letter answers (A,B,C,D) or full text
                    let correct = ans;
                    if (ans === 'A') correct = a;
                    else if (ans === 'B') correct = b;
                    else if (ans === 'C') correct = c;
                    else if (ans === 'D') correct = d;
                    return {
                        "Question": q.trim(),
                        "A": a.trim(), "B": b.trim(), "C": c.trim(), "D": d.trim(),
                        "Correct Answer": correct.trim()
                    };
                }).filter(x => x !== null);
            }
        }
    }

    const container = document.getElementById('mcq-container');
    const noResults = document.getElementById('no-results');
    const themeSelector = document.getElementById('theme-selector');
    const toggleAnswersBtn = document.getElementById('toggle-answers');
// Add right after toggleAnswersBtn declaration:
toggleAnswersBtn.textContent = 'Hide Answers';
toggleAnswersBtn.classList.remove('primary');

    const resetBtn = document.getElementById('reset-quiz');
    const clearTopBtn = document.getElementById('clear-top');
    const exportBtn = document.getElementById('export-btn');
    const searchBox = document.getElementById('search-box');

    let answersRevealed = true;
    let userAnswers = {}; // Store { questionIndex: selectedOptionLetter }

    // 🎨 Theme Switcher
    themeSelector.addEventListener('change', (e) => {
      document.body.setAttribute('data-theme', e.target.value);
      localStorage.setItem('eka-theme', e.target.value);
    });
    const savedTheme = localStorage.getItem('eka-theme');
    if (savedTheme && themeSelector.querySelector(`option[value="${savedTheme}"]`)) {
      themeSelector.value = savedTheme;
      document.body.setAttribute('data-theme', savedTheme);
    }

    // 🔍 Live Search - Case insensitive across Question, A, B, C, D
    searchBox.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      let visibleCount = 0;

      document.querySelectorAll('.question-card').forEach(card => {
        const idx = parseInt(card.dataset.index);
        const q = mcqData[idx];
        const searchable = [q.Question, q.A, q.B, q.C, q.D].join(' ').toLowerCase();

        if (term === '' || searchable.includes(term)) {
          card.classList.remove('hidden');
          visibleCount++;
        } else {
          card.classList.add('hidden');
        }
      });

      noResults.style.display = visibleCount === 0 ? 'block' : 'none';
    });

    // 📖 Render MCQs with new data format
    function renderMCQs() {
      container.innerHTML = '';

      mcqData.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.dataset.index = idx;

        // Question text
        const qText = document.createElement('div');
        qText.className = 'q-text';
        qText.textContent = `${idx + 1}. ${item.Question}`;
        card.appendChild(qText);

        // Options container
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options';

        ['A', 'B', 'C', 'D'].forEach(optLetter => {
          const label = document.createElement('label');
          label.className = 'option';
          label.dataset.option = optLetter;
          label.innerHTML = `
            <input type="radio" name="q${idx}" value="${optLetter}">
            <span class="radio-dot"></span>
            <span><span class="option-label">${optLetter}:</span> ${item[optLetter]}</span>
          `;
          label.addEventListener('click', (e) => {
            e.preventDefault();
            handleOptionSelect(idx, optLetter, label);
          });
          optsDiv.appendChild(label);
        });

        card.appendChild(optsDiv);
        container.appendChild(card);
      });
    }

    // ✅ Handle Option Selection
    function handleOptionSelect(qIdx, selectedOpt, label) {
      // Remove selected from siblings
      const opts = label.closest('.options').querySelectorAll('.option');
      opts.forEach(o => o.classList.remove('selected'));

      // Mark as selected
      label.classList.add('selected');
      label.querySelector('input').checked = true;

      // Save answer
      userAnswers[qIdx] = selectedOpt;
      localStorage.setItem('eka-answers', JSON.stringify(userAnswers));

      // Re-apply highlights if in revealed mode
      if (answersRevealed) applyAnswerHighlights();
    }

// Add this function right before the toggleAnswersBtn.addEventListener:
    function applyAnswerHighlights() {
      document.querySelectorAll('.question-card').forEach(card => {
        if (card.classList.contains('hidden')) return;
        const qIdx = parseInt(card.dataset.index);
        const correctAnswer = mcqData[qIdx]["Correct Answer"];
        card.querySelectorAll('.option').forEach(opt => {
          opt.classList.remove('correct', 'wrong');
          if (answersRevealed) {
            const optLetter = opt.dataset.option;
            const optText = mcqData[qIdx][optLetter];
            if (optText === correctAnswer) opt.classList.add('correct');
            else if (userAnswers[qIdx] === optLetter) opt.classList.add('wrong');
          }
        });
      });
    }

    // Inside your toggle listener, replace the long highlight block with:
    toggleAnswersBtn.addEventListener('click', () => {
      answersRevealed = !answersRevealed;
      toggleAnswersBtn.textContent = answersRevealed ? 'Hide Answers' : 'Show Answers';
      toggleAnswersBtn.classList.toggle('primary', !answersRevealed);
      applyAnswerHighlights();
    });

    function resetQuiz() {
      if (!confirm('Clear all selected answers and progress?')) return;

      answersRevealed = false;
      toggleAnswersBtn.textContent = 'Show Answers';
      toggleAnswersBtn.classList.add('primary');
      userAnswers = {};
      localStorage.removeItem('eka-answers');

      document.querySelectorAll('.option').forEach(opt => {
        opt.classList.remove('selected', 'correct', 'wrong');
        const input = opt.querySelector('input');
        if (input) input.checked = false;
      });
    }

    // 🔄 Reset Quiz Progress
    resetBtn.addEventListener('click', resetQuiz);
    if (clearTopBtn) clearTopBtn.addEventListener('click', resetQuiz);

    // 💾 Export Answers as JSON
    exportBtn.addEventListener('click', () => {
      const results = mcqData.map((q, idx) => ({
        question: q.Question,
        yourAnswer: userAnswers[idx] || 'Not answered',
        correctAnswer: q["Correct Answer"],
        isCorrect: userAnswers[idx] === q["Correct Answer"] || null
      }));

      const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'eka-audit-results.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    // ⏳ Load saved answers & init
    setTimeout(() => {
      initData();
      const saved = localStorage.getItem('eka-answers');
      if (saved) userAnswers = JSON.parse(saved);

      renderMCQs();

      // Restore selections
      Object.entries(userAnswers).forEach(([idx, optLetter]) => {
        const card = document.querySelector(`.question-card[data-index="${idx}"]`);
        if (card) {
          const target = card.querySelector(`.option[data-option="${optLetter}"]`);
          if (target) {
            target.classList.add('selected');
            target.querySelector('input').checked = true;
          }
        }
      });


// At the very end of your setTimeout block, add:
applyAnswerHighlights(); // ← Triggers on page load

    }, 600);


</script>
</body>
</html>
