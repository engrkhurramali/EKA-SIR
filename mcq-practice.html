            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.25);
            --success: #2dd4bf;
            --shadow: rgba(0, 0, 0, 0.07);

        [data-theme="dark-neon"] {

            --glass: rgba(30, 41, 59, 0.8);

            --text-secondary: #94a3b8;

            --success: #34d399;
            --shadow: rgba(0, 0, 0, 0.2);
            --card-shadow: 0 8px 35px rgba(0, 0, 0, 0.35);

        [data-theme="ocean-breeze"] {

            --glass: rgba(255, 255, 255, 0.45);
            --glass-heavy: rgba(255, 255, 255, 0.65);

            --glass-heavy: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.65);
            --text-primary: #5a3e28;
            --text-secondary: #8b6b54;
            --accent: #fb923c;

            --success: #fbbf24;

            --card-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

            --glass: rgba(6, 78, 59, 0.7);

            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #ecfdf5;
            --text-secondary: #a7f3d0;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.3);
            --success: #34d399;
            --shadow: rgba(0, 0, 0, 0.2);

        /* ========== BASE STYLES ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: background 0.4s ease;
        }

        .main-container {
            width: 100%;
            max-width: 600px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            margin: 5px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
        }

        .header h1 { font-size: 1.2rem; margin-bottom: 2px; color: var(--text-primary); }
        .header h2 { font-size: 0.85rem; opacity: 0.85; color: var(--text-secondary); font-weight: 500; }

        /* ========== COMPACT TOP CONTROLS ========== */
        .top-controls {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            align-items: center;
            width: 100%;
        }

        .theme-wrapper { position: relative; flex: 1.2; }

        .themes-toggle {
            background: var(--glass-heavy);
            border: 1px solid var(--glass-border);
            padding: 8px 10px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 0.8rem;
            color: var(--text-primary);
            width: 100%;
            transition: 0.2s;
        }

        .themes-menu {
            position: absolute;
            top: calc(100% + 5px);
            left: 0; right: 0;
            background: var(--glass-heavy);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 8px;
            box-shadow: 0 10px 30px var(--shadow);
            border: 1px solid var(--glass-border);
            display: none;
            z-index: 1000;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
        }
        .themes-menu.show { display: grid; }

        .theme-option {
            display: flex; align-items: center; gap: 6px; padding: 6px;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            background: rgba(255,255,255,0.1);
        }
        .theme-option:hover { background: rgba(255,255,255,0.2); }
        .theme-option.active { border: 1px solid var(--accent); background: rgba(255,255,255,0.3); }
        .theme-preview { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
        .theme-name { font-size: 0.7rem; font-weight: 600; }

        .control-btn {
            flex: 1;
            padding: 8px 4px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--glass-heavy);
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
            transition: 0.2s;
        }
        .control-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .auto-group {
            flex: 1.5;
            display: flex;
            background: var(--glass-heavy);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            align-items: center;
        }
        .auto-btn {
            border: none; background: transparent; padding: 8px;
            font-weight: 700; cursor: pointer; color: var(--text-primary);
            flex: 1; font-size: 0.8rem;
        }
        .auto-btn.active { background: var(--accent); color: white; }
        .auto-input {
            width: 45px; border: none; background: rgba(0,0,0,0.05);
            padding: 8px 2px; text-align: center; font-size: 0.75rem;
            color: var(--text-primary); outline: none;
        }

        .timer-display {
            flex: 0.8;
            font-weight: 700;
            font-size: 0.85rem;
            text-align: right;
            color: var(--text-primary);
            font-family: monospace;
            padding-right: 5px;
        }

        /* ========== QUESTION AREA ========== */
        .question-area {
            background: var(--glass-heavy);
            border-radius: 18px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid var(--glass-border);
            min-height: 120px;
        }

        .question-text {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .options-list { display: flex; flex-direction: column; gap: 8px; }

        .option-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid var(--glass-border);
            padding: 10px 12px;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .option-btn:hover { transform: translateX(3px); background: rgba(255,255,255,0.3); }
        .option-btn.selected { background: var(--accent); color: white; }
        .option-btn.correct { background: var(--success); color: white; }
        .option-btn.incorrect { background: #ff6b6b; color: white; }
        .option-letter { font-weight: 700; min-width: 20px; }

        /* ========== NAVIGATION ========== */
        .quiz-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--glass-border);
        }

        .nav-btn {
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: var(--glass-heavy); color: var(--text-primary); font-weight: 600;
            cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .progress-info { font-size: 0.85rem; font-weight: 700; color: var(--text-secondary); }

        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 999; display: none; }
        .overlay.show { display: block; }

        @media (max-width: 480px) {
            .themes-menu.show {
                position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
                width: 85%; max-height: 70vh; overflow-y: auto; grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<script>
    // ========== THEME SYSTEM (Remains Intact) ==========
    function toggleThemesMenu(e) {
        e?.stopPropagation();
        const menu = document.getElementById('themesMenu');
        const toggle = document.querySelector('.themes-toggle');
        const overlay = document.getElementById('themeOverlay');
        const isOpen = menu.classList.contains('show');
        closeThemesMenu();
        if (!isOpen) {
            menu.classList.add('show');
            toggle.classList.add('active');
            overlay.classList.add('show');
        }
    }

    function closeThemesMenu(e) {
        e?.stopPropagation();
        const menu = document.getElementById('themesMenu');
        const toggle = document.querySelector('.themes-toggle');
        const overlay = document.getElementById('themeOverlay');
        menu.classList.remove('show');
        toggle.classList.remove('active');
        overlay.classList.remove('show');
    }

    function selectTheme(themeName, e) {
        e?.stopPropagation();
        document.querySelectorAll('.theme-option').forEach(opt => opt.classList.remove('active'));
        document.querySelector(`[data-theme="${themeName}"]`)?.classList.add('active');
        document.documentElement.setAttribute('data-theme', themeName);
        localStorage.setItem('eka_quiz_theme', themeName);
        closeThemesMenu();
        showNotification(`🎨 ${themeName.replace('-', ' ').toUpperCase()} theme applied!`);
    }

    function showNotification(message) {
        const notification = document.createElement('div');
        notification.textContent = message;
        notification.style.cssText = `position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass-heavy); padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; color: var(--text-primary); box-shadow: 0 4px 20px var(--shadow); z-index: 10000; animation: slideUp 0.3s ease; border: 1px solid var(--glass-border);`;
        if (!document.getElementById('notif-keyframes')) {
            const style = document.createElement('style');
            style.id = 'notif-keyframes';
            style.textContent = `@keyframes slideUp { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); }}`;
            document.head.appendChild(style);
        }
        document.body.appendChild(notification);
        setTimeout(() => notification.remove(), 2000);
    }

function initQuiz() {
    if (!window.QUIZ_DATA) {

        return;
    }

    if (!subjectParam) {
        document.getElementById('questionText').textContent = 'No subject selected.';
        return;
    }

    const keys = Object.keys(QUIZ_DATA).filter(k =>
        k.includes(subjectParam) || k.startsWith(subjectParam)
    );

    let combinedTsv = '';
    keys.forEach(k => {
        const tsv = QUIZ_DATA[k]?.tsv || '';
        if (tsv.trim()) combinedTsv += (combinedTsv ? '\n' : '') + tsv.trim();
    });

    questions = combinedTsv.split('\n').map(line => {
        const p = line.split('\t');
        if (p.length < 6) return null;

        const [q, a, b, c, d, ans] = p;
        const letterMap = { A: 0, B: 1, C: 2, D: 3 };
        const correctIdx = letterMap[(ans || '').trim().toUpperCase()];

        if (correctIdx === undefined) return null;

        return {
            question: q.trim(),
            options: [a.trim(), b.trim(), c.trim(), d.trim()],
            correct: correctIdx
        };
    }).filter(Boolean);

    if (questions.length === 0) {
        document.getElementById('questionText').textContent = `No questions found for ${subjectParam}`;
        return;
    }

    document.getElementById('subjectDisplay').textContent = `${subjectParam.toUpperCase()} PRACTICE`;
    startTimer();
    loadQuestion(0);
    updateProgress();
}

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
        }, 1000);
    }

function planAutoAdvance() {
    if (autoNextTimeout) {
        clearTimeout(autoNextTimeout);
        autoNextTimeout = null;
    }

    if (!autoMode || isFinished) return;

    // Get delay from input, fallback to 2000ms
    const delayInput = document.getElementById('autoDelay');
    let delayValue = 2000;
    if (delayInput && delayInput.value) {
        delayValue = parseInt(delayInput.value, 10);
    }

    // Ensure at least 500ms delay to prevent rapid looping
    if (isNaN(delayValue) || delayValue < 500) delayValue = 2000;

    autoNextTimeout = setTimeout(() => {
        if (autoMode && !isFinished) {
            nextQuestion();
        }
    }, delayValue);
}

function loadQuestion(index) {
    if (isFinished) return;
    if (!questions || questions.length === 0) return;
    if (index < 0 || index >= questions.length) return;

    currentQuestion = index;
    const q = questions[index];

    // Update UI
    document.getElementById('questionText').textContent = `${index + 1}. ${q.question}`;

    const optionsList = document.getElementById('optionsList');
    optionsList.innerHTML = '';

    q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65 + i)}.</span> ${opt}`;

        // Highlight selection if user previously answered this question
        if (userAnswers[index] === i) btn.classList.add('selected');

        // Show feedback if Answers mode is ON
        if (showAnswersMode) {
            if (i === q.correct) btn.classList.add('correct');
            else if (userAnswers[index] === i) btn.classList.add('incorrect');
        }

        btn.onclick = () => selectOption(index, i);
        optionsList.appendChild(btn);
    });

    // Update Navigation Buttons
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    if (prevBtn) prevBtn.disabled = (index === 0);
    if (nextBtn) nextBtn.textContent = (index === questions.length - 1) ? 'FINISH' : 'NEXT ➡';

    updateProgress();

    // If autoMode is ON, schedule the next slide
    planAutoAdvance();
}

// ========== FIXED AUTO-ADVANCE & TIMER LOGIC ==========

function selectOption(qIndex, optIndex) {
    if (isFinished) return;
    userAnswers[qIndex] = optIndex;
    loadQuestion(qIndex);
}

function toggleAuto() {
    if (isFinished) return;
    autoMode = !autoMode;

    const autoBtn = document.getElementById('autoBtn');
    if (autoBtn) {
        if (autoMode) autoBtn.classList.add('active');
        else autoBtn.classList.remove('active');
    }

    if (autoMode) {
        planAutoAdvance();
    } else {
        if (autoNextTimeout) {
            clearTimeout(autoNextTimeout);
            autoNextTimeout = null;
        }
    }

    showNotification(autoMode ? '⚡ Auto-advance ON' : '⏸ Auto-advance OFF');
}

function toggleAnswers() {
    if (isFinished) return;
    showAnswersMode = !showAnswersMode;
    const btn = document.getElementById('showAnswersBtn');
    if (btn) {
        if (showAnswersMode) btn.classList.add('active');
        else btn.classList.remove('active');
    }
    loadQuestion(currentQuestion);
    showNotification(showAnswersMode ? '✅ Answers revealed' : '🔒 Answers hidden');
}

function nextQuestion() {
    if (autoNextTimeout) {
        clearTimeout(autoNextTimeout);
        autoNextTimeout = null;
    }

    if (currentQuestion < questions.length - 1) {
        loadQuestion(currentQuestion + 1);
    } else {
        finishQuiz();
    }
}

function prevQuestion() {
    if (autoNextTimeout) {
        clearTimeout(autoNextTimeout);
        autoNextTimeout = null;
    }

    if (currentQuestion > 0) {
        loadQuestion(currentQuestion - 1);
    }
}


function updateProgress() {
    document.getElementById('progressInfo').textContent = `${currentQuestion + 1}/${questions.length}`;
}

    function finishQuiz() {
        isFinished = true;
        clearInterval(timerInterval);
        let score = 0;
        questions.forEach((q, i) => { if (userAnswers[i] === q.correct) score++; });
        const percentage = Math.round((score / questions.length) * 100);

        document.getElementById('questionText').innerHTML = `
            🎉 Quiz Complete!<br><br>
            Score: <strong>${score}/${questions.length}</strong> (${percentage}%)
        `;
        document.getElementById('optionsList').innerHTML = `
            <button class="control-btn primary" onclick="location.reload()" style="width: 100%;">🔄 Try Again</button>
        `;
        document.querySelector('.quiz-nav').style.display = 'none';
    }

    window.addEventListener('load', () => {
        const savedTheme = localStorage.getItem('eka_quiz_theme');
        if (savedTheme) {
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.querySelectorAll('.theme-option').forEach(opt => {
                opt.classList.toggle('active', opt.getAttribute('data-theme') === savedTheme);
            });
        }
        setTimeout(initQuiz, 300);
    });
</script>
