<!DOCTYPE html>
<html lang="en">
<head>

    <title>EKA MCQ's - PHYSICS 10</title>

    <style>
        :root {
          --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --text-muted: #64748b;
          --primary: #3b82f6; --primary-hover: #2563eb; --correct: #22c55e; --wrong: #ef4444;
          --border: #e2e8f0; --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); --radius: 12px;
          --font: system-ui, -apple-system, sans-serif; --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="3d-glass"] { --bg: #e0e7ff; --surface: rgba(255,255,255,0.65); --border: rgba(255,255,255,0.4); --shadow: 0 8px 32px rgba(31,38,135,0.15); backdrop-filter: blur(12px); }
        [data-theme="neumorphic-soft"] { --bg: #e0e0e0; --surface: #e0e0e0; --text: #4a4a4a; --border: transparent; --shadow: 8px 8px 16px #bebebe, -8px -8px 16px #ffffff; --radius: 16px; }
        [data-theme="neumorphic-pressed"] { --bg: #e0e0e0; --surface: #e0e0e0; --shadow: inset 5px 5px 10px #bebebe, inset -5px -5px 10px #ffffff; --radius: 12px; }
        [data-theme="modern-2x2"] { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --primary: #06b6d4; --radius: 8px; }
        [data-theme="vibrant-gradient"] { --bg: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #feada6 100%); --surface: #fff; --primary: #ff4757; --radius: 20px; }
        [data-theme="industrial-steel"] { --bg: #1e293b; --surface: #334155; --text: #e2e8f0; --primary: #3b82f6; --border: #475569; --radius: 4px; }
        [data-theme="dark-neon"] { --bg: #0a0a0a; --surface: #111; --text: #00ff9d; --primary: #00ff9d; --border: #00ff9d; --shadow: 0 0 15px #00ff9d44; }
        [data-theme="paper-sketch"] { --bg: #fdfbf7; --surface: #fff; --text: #333; --border: #333; --radius: 2px; --font: 'Courier New', monospace; --shadow: 2px 3px 0 #333; }
        [data-theme="royal-gold"] { --bg: #0f172a; --surface: #1e1b4b; --text: #fde047; --primary: #f59e0b; --border: #fbbf24; }
        [data-theme="retro-8bit"] { --bg: #21252b; --surface: #3a3f4b; --text: #abb2bf; --primary: #98c379; --border: #5c6370; --radius: 0; --font: monospace; }
        [data-theme="hacker-terminal"] { --bg: #000; --surface: #000; --text: #00ff00; --primary: #00ff00; --border: #00ff00; --font: monospace; }
        [data-theme="pastel-dream"] { --bg: #fff0f5; --surface: #ffe4e1; --text: #5c5470; --primary: #b8a9c9; --border: #d8bfd8; }
        [data-theme="minimalist-mono"] { --bg: #fff; --surface: #fff; --text: #000; --primary: #000; --border: #000; --radius: 0; }
        [data-theme="translucent-frosted"] { --bg: linear-gradient(45deg, #6a11cb 0%, #2575fc 100%); --surface: rgba(255,255,255,0.8); --border: rgba(255,255,255,0.5); --shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        [data-theme="sky-high"] { --bg: linear-gradient(to bottom, #87ceeb, #ffffff); --surface: rgba(255,255,255,0.9); --primary: #0077b6; --radius: 18px; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: var(--font); background: var(--bg); color: var(--text);
          min-height: 100vh; padding: 10px; transition: background var(--transition);
          display: flex; flex-direction: column; gap: 10px;
        }
        header {
          background: var(--surface); padding: 10px; border-radius: var(--radius);
          box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100;
          display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between;
        }
        .header-left { display: flex; flex-direction: column; gap: 2px; }
        h1 { font-size: 1.1rem; font-weight: 700; }
        .subtitle { font-size: 0.8rem; color: var(--text-muted); }
        .mode-badge { font-size: 0.75rem; padding: 2px 6px; background: var(--primary); color: #fff; border-radius: 4px; display: inline-block; margin-top: 2px; }
        .header-controls { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; flex: 1; justify-content: flex-end; }
        #search-box {
          padding: 8px 12px; border: 2px solid var(--border); border-radius: var(--radius);
          background: var(--bg); color: var(--text); font-size: 0.9rem; min-width: 140px; flex: 1;
          transition: border-color 0.2s;
        }
        #search-box:focus { outline: none; border-color: var(--primary); }
        select, button, .upload-label {
          padding: 8px 10px; border: 2px solid var(--border); background: var(--surface);
          color: var(--text); border-radius: var(--radius); font-size: 0.85rem; cursor: pointer;
          transition: all var(--transition); touch-action: manipulation; text-align: center;
        }
        button:active { transform: scale(0.98); }
        button.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        button.primary:hover { background: var(--primary-hover); }
        .upload-label { display: inline-block; background: #f1f5f9; }
        .upload-label:hover { background: #e2e8f0; }
        #mcq-container {
          background: var(--surface); border-radius: var(--radius); padding: 14px;
          box-shadow: var(--shadow); flex: 1; display: flex; flex-direction: column; gap: 12px;
          transition: background var(--transition), box-shadow var(--transition);
        }
        .question-card { border-bottom: 1px dashed var(--border); padding-bottom: 12px; margin-bottom: 12px; transition: opacity 0.2s; }
        .question-card.hidden { display: none; }
        .q-text { font-weight: 600; margin-bottom: 10px; line-height: 1.4; font-size: 0.95rem; }
        .options { display: grid; gap: 6px; }
        .option {
          display: flex; align-items: center; gap: 8px; padding: 10px;
          border: 2px solid var(--border); border-radius: var(--radius); cursor: pointer;
          transition: all 0.2s; background: var(--surface); font-size: 0.9rem;
        }
        .option:hover { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 8%, transparent); }
        .option.selected { border-color: var(--primary); background: color-mix(in srgb, var(--primary) 12%, transparent); }
        .option.correct { border-color: var(--correct); background: color-mix(in srgb, var(--correct) 15%, transparent); }
        .option.wrong { border-color: var(--wrong); background: color-mix(in srgb, var(--wrong) 12%, transparent); opacity: 0.8; }
        .option input { display: none; }
        .radio-dot {
          width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border);
          position: relative; transition: all 0.2s; flex-shrink: 0;
        }
        .option.selected .radio-dot { border-color: var(--primary); }
        .option.selected .radio-dot::after { content: ''; position: absolute; inset: 2px; background: var(--primary); border-radius: 50%; }
        .option.correct .radio-dot::after { background: var(--correct); border-color: var(--correct); }
        .option.wrong .radio-dot::after { background: var(--wrong); border-color: var(--wrong); }
        .option-label { font-weight: 600; margin-right: 4px; color: var(--primary); }
        .loading, .no-results { text-align: center; padding: 20px 0; color: var(--text-muted); font-style: italic; }
        .no-results { display: none; }
        footer { display: flex; gap: 8px; flex-wrap: wrap; padding: 8px 0; position: sticky; bottom: 0; background: var(--bg); }
        footer button { flex: 1; min-width: 100px; }
        #excel-upload { display: none; }
        @media (max-width: 480px) {
          body { padding: 8px; }
          header { padding: 8px; gap: 6px; }
          h1 { font-size: 1rem; }
          #search-box { min-width: 100px; }
          .option { padding: 12px; font-size: 0.9rem; }
        }
    </style>
</head>

        let mcqData = [...defaultMCQs];
        let userAnswers = {};
        let answersRevealed = true; // Default ON as requested

        const container = document.getElementById('mcq-container');
        const noResults = document.getElementById('no-results');
        const themeSelector = document.getElementById('theme-selector');
        const toggleAnswersBtn = document.getElementById('toggle-answers');
        const resetBtn = document.getElementById('reset-quiz');
        const exportBtn = document.getElementById('export-btn');
        const searchBox = document.getElementById('search-box');
        const excelUpload = document.getElementById('excel-upload');
        const loadDefaultBtn = document.getElementById('load-default');
        const modeIndicator = document.getElementById('mode-indicator');

        themeSelector.addEventListener('change', (e) => {
          document.body.setAttribute('data-theme', e.target.value);
          localStorage.setItem('eka-theme', e.target.value);
        });
        const savedTheme = localStorage.getItem('eka-theme');
        if (savedTheme && themeSelector.querySelector(`option[value="${savedTheme}"]`)) {
          themeSelector.value = savedTheme;
          document.body.setAttribute('data-theme', savedTheme);
        }

        searchBox.addEventListener('input', (e) => {
          const term = e.target.value.toLowerCase().trim();
          let visibleCount = 0;
          document.querySelectorAll('.question-card').forEach(card => {
            const idx = parseInt(card.dataset.index);
            const q = mcqData[idx];
            const searchable = [q.Question, q.A, q.B, q.C, q.D].join(' ').toLowerCase();
            if (term === '' || searchable.includes(term)) {
              card.classList.remove('hidden');
              visibleCount++;
            } else {
              card.classList.add('hidden');
            }
          });
          noResults.style.display = visibleCount === 0 ? 'block' : 'none';
        });

        function renderMCQs() {
          container.innerHTML = '';
          if (mcqData.length === 0) {
            container.innerHTML = '<div class="loading">No questions loaded.</div>';
            return;
          }
          mcqData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.dataset.index = idx;
            card.innerHTML = `<div class="q-text">${idx + 1}. ${item.Question}</div><div class="options"></div>`;
            const optsDiv = card.querySelector('.options');
            ['A', 'B', 'C', 'D'].forEach(optLetter => {
              const label = document.createElement('label');
              label.className = 'option';
              label.dataset.option = optLetter;
              label.innerHTML = `<input type="radio" name="q${idx}" value="${optLetter}"><span class="radio-dot"></span><span><span class="option-label">${optLetter}:</span> ${item[optLetter]}</span>`;
              label.addEventListener('click', (e) => { e.preventDefault(); handleOptionSelect(idx, optLetter, label); });
              optsDiv.appendChild(label);
            });
            container.appendChild(card);
          });
          applyAnswerHighlights();
          restoreAnswers();
        }

        function handleOptionSelect(qIdx, selectedOpt, label) {
          if (answersRevealed) return;
          const opts = label.closest('.options').querySelectorAll('.option');
          opts.forEach(o => o.classList.remove('selected'));
          label.classList.add('selected');
          label.querySelector('input').checked = true;
          userAnswers[qIdx] = selectedOpt;
          localStorage.setItem('eka-answers', JSON.stringify(userAnswers));
        }

        // 🔧 FIXED: Properly toggles highlights ON/OFF
        function applyAnswerHighlights() {
          document.querySelectorAll('.question-card').forEach(card => {
            if (card.classList.contains('hidden')) return;
            const qIdx = parseInt(card.dataset.index);
            const correctAnswer = mcqData[qIdx]["Correct Answer"];

            card.querySelectorAll('.option').forEach(opt => {
              opt.classList.remove('correct', 'wrong'); // ALWAYS reset first
              if (answersRevealed) {
                const optLetter = opt.dataset.option;
                const optText = mcqData[qIdx][optLetter];
                if (optText === correctAnswer) opt.classList.add('correct');
                else if (userAnswers[qIdx] === optLetter) opt.classList.add('wrong');
              }
            });
          });
        }

        toggleAnswersBtn.addEventListener('click', () => {
          answersRevealed = !answersRevealed;
          toggleAnswersBtn.textContent = answersRevealed ? 'Hide Answers' : 'Show Answers';
          toggleAnswersBtn.classList.toggle('primary');
          applyAnswerHighlights(); // Triggers correct toggle behavior
        });

        function restoreAnswers() {
          Object.entries(userAnswers).forEach(([idx, optLetter]) => {
            const card = document.querySelector(`.question-card[data-index="${idx}"]`);
            if (card) {
              const target = card.querySelector(`.option[data-option="${optLetter}"]`);
              if (target) { target.classList.add('selected'); target.querySelector('input').checked = true; }
            }
          });
        }

        resetBtn.addEventListener('click', () => {
          if (!confirm('Reset all selected answers for this dataset?')) return;
          userAnswers = {};
          localStorage.removeItem('eka-answers');
          document.querySelectorAll('.option').forEach(opt => { opt.classList.remove('selected', 'correct', 'wrong'); opt.querySelector('input').checked = false; });
          answersRevealed = true;
          toggleAnswersBtn.textContent = 'Hide Answers';
          toggleAnswersBtn.classList.remove('primary');
          applyAnswerHighlights();
        });

        exportBtn.addEventListener('click', () => {
          const results = mcqData.map((q, idx) => ({ question: q.Question, yourAnswer: userAnswers[idx] || 'Not answered', correctAnswer: q["Correct Answer"], isCorrect: userAnswers[idx] === q["Correct Answer"] || null }));
          const blob = new Blob([JSON.stringify(results, null, 2)], {type: 'application/json'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'eka-results.json'; a.click(); URL.revokeObjectURL(url);
        });

        excelUpload.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          container.innerHTML = '<div class="loading">Parsing Excel file...</div>';
          const reader = new FileReader();
          reader.onload = (evt) => {
            try {
              const wb = XLSX.read(evt.target.result, {type: 'array'});
              const ws = wb.Sheets[wb.SheetNames[0]];
              let rawData = XLSX.utils.sheet_to_json(ws);
              if (rawData.length === 0) throw new Error('Empty spreadsheet.');
              rawData = rawData.filter(row => Object.values(row).some(v => v !== null && v !== undefined && v !== ''));
              const keys = Object.keys(rawData[0]).map(k => k.toLowerCase().trim());
              const required = ['question', 'a', 'b', 'c', 'd', 'correct answer'];
              const missing = required.filter(r => !keys.includes(r));
              if (missing.length > 0) throw new Error(`Missing columns: ${missing.join(', ')}`);

              mcqData = rawData.map(row => {
                const norm = {};
                for (let key in row) {
                  const lower = key.toLowerCase().trim();
                  if (lower === 'question') norm.Question = String(row[key]).trim();
                  else if (lower === 'a') norm.A = String(row[key]).trim();
                  else if (lower === 'b') norm.B = String(row[key]).trim();
                  else if (lower === 'c') norm.C = String(row[key]).trim();
                  else if (lower === 'd') norm.D = String(row[key]).trim();
                  else if (lower === 'correct answer') norm["Correct Answer"] = String(row[key]).trim();
                }
                return norm;
              });

              userAnswers = {}; localStorage.removeItem('eka-answers');
              answersRevealed = true; toggleAnswersBtn.textContent = 'Hide Answers'; toggleAnswersBtn.classList.remove('primary');
              modeIndicator.textContent = `📊 Excel Mode (${mcqData.length} Qs)`;
              searchBox.value = '';
              renderMCQs();
              alert(`✅ Loaded ${mcqData.length} questions from Excel.`);
            } catch (err) {
              container.innerHTML = '<div class="loading" style="color:var(--wrong)">Error: ' + err.message + '</div>';
              setTimeout(renderMCQs, 2000);
            }
          };
          reader.readAsArrayBuffer(file);
        });

        loadDefaultBtn.addEventListener('click', () => {
          mcqData = [...defaultMCQs];
          userAnswers = {}; localStorage.removeItem('eka-answers');
          answersRevealed = true; toggleAnswersBtn.textContent = 'Hide Answers'; toggleAnswersBtn.classList.remove('primary');
          modeIndicator.textContent = '📚 Default Mode';
          searchBox.value = '';
          renderMCQs();
        });

        setTimeout(() => {
          const saved = localStorage.getItem('eka-answers');
          if (saved) userAnswers = JSON.parse(saved);
          // Ensure initial button state matches answersRevealed = true
          toggleAnswersBtn.textContent = 'Hide Answers';
          toggleAnswersBtn.classList.remove('primary');
          renderMCQs();
        }, 500);
</script>
</body>
</html>
