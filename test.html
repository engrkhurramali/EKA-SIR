<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBT Tests - EKA SIR</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.25);
            --glass-heavy: rgba(255, 255, 255, 0.4);
            --sky-blue: #87CEEB;
            --mint-green: #98FF98;
            --text-dark: #1a5f7a;
            --border: rgba(255, 255, 255, 0.5);
        }

        body {
            background: linear-gradient(135deg, var(--sky-blue), var(--mint-green));
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }

        .home-nav {
            display: flex;
            align-items: center;
            background: var(--glass-heavy);
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            margin-bottom: 25px;
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .class-btn {
            background: var(--glass-heavy);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 800;
            color: var(--text-dark);
            font-size: 0.9rem;
        }

        .class-btn.active { background: #fff; }

        .subject-section { display: none; }
        .subject-section.active { display: block; animation: fadeIn 0.4s; }

        .note-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
        }

        .tag {
            font-size: 0.7rem;
            background: var(--text-dark);
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<a href="index.html" class="home-nav">🏠 Dashboard</a>

<div class="main-container">
    <h1>CBT ASSESSMENT</h1>

    <div class="class-grid">
        <div class="class-btn active" onclick="showClass('KG1', this)">KG-1</div>
        <div class="class-btn" onclick="showClass('KG2', this)">KG-2</div>
        <script>
            for(let i=1; i<=10; i++) {
                document.write(`<div class="class-btn" onclick="showClass(${i}, this)">Class ${i}</div>`);
            }
        </script>
    </div>

    <hr style="border: 0; height: 1px; background: var(--border); margin-bottom: 20px;">

    <!-- KG1 to 10 Sections -->
    <div id="classKG1" class="subject-section active">
        <h3>📝 KG-1 SUBJECTS</h3>
        <a href="chapter_select.html?subject=kg1_maths&grade=KG1" class="note-card">Mathematics <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg1_english&grade=KG1" class="note-card">English <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg1_urdu&grade=KG1" class="note-card">Urdu <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg1_islamiat&grade=KG1" class="note-card">Islamiat <span class="tag">SELECT</span></a>
    </div>

    <div id="classKG2" class="subject-section">
        <h3>📝 KG-2 SUBJECTS</h3>
        <a href="chapter_select.html?subject=kg2_maths&grade=KG2" class="note-card">Mathematics <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg2_english&grade=KG2" class="note-card">English <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg2_urdu&grade=KG2" class="note-card">Urdu <span class="tag">SELECT</span></a>
        <a href="chapter_select.html?subject=kg2_islamiat&grade=KG2" class="note-card">Islamiat <span class="tag">SELECT</span></a>
    </div>

    <script>
        const subjects = ['maths', 'english', 'urdu', 'science', 'sstudies', 'islamiat', 'computer', 'sindhi'];
        const gradeNames = [1,2,3,4,5,6,7,8];
        gradeNames.forEach(g => {
            document.write(`<div id="class${g}" class="subject-section"><h3>📝 CLASS ${g} SUBJECTS</h3>`);
            subjects.forEach(s => {
                document.write(`<a href="chapter_select.html?subject=class${g}_${s}&grade=${g}" class="note-card">${s.charAt(0).toUpperCase()+s.slice(1)} <span class="tag">SELECT</span></a>`);
            });
            document.write(`</div>`);
        });

        // 9 and 10
        const highSubs = ['maths', 'physics', 'chem', 'bio', 'comp', 'eng', 'urdu', 'isl', 'pst', 'sindhi'];
        [9, 10].forEach(g => {
            document.write(`<div id="class${g}" class="subject-section"><h3>📝 CLASS ${g} SUBJECTS</h3>`);
            highSubs.forEach(s => {
                let subCode = s + g; // Consistent naming: chem9, bio10, etc.

                if (s === 'maths' && (g === 9 || g === 10)) {
                    // Reverting to new page UI for Maths 9 & 10 as requested
                    document.write(`<a href="chapter_select.html?subject=maths${g}&grade=${g}" class="note-card">Mathematics (Multi-Select) <span class="tag">SELECT</span></a>`);
                } else {
                    document.write(`<a href="chapter_select.html?subject=${subCode}&grade=${g}" class="note-card">${s.charAt(0).toUpperCase()+s.slice(1)} <span class="tag">SELECT</span></a>`);
                }
            });
            document.write(`</div>`);
        });
    </script>
</div>

<script>
    function showClass(num, btn) {
        document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.subject-section').forEach(s => s.classList.remove('active'));
        document.getElementById('class' + num).classList.add('active');
    }
</script>

</body>
</html>
