<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
        background: linear-gradient(135deg, #87CEEB, #98FF98); /* Sky Blue to Mint Green */
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        height: 100vh;
        padding-top: 25px;
        margin-top: 20px;
    }

    h1 { color: #fff; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        padding: 20px;
        width: 90%;
    }

    .card {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 15px;
        height: 120px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: #333;
        font-weight: bold;
        box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
        transition: transform 0.2s;
    }

    .card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.4); }

    .icon { font-size: 30px; margin-bottom: 5px; }
  </style>
</head>
<body>

<h1>EKA SIR Dashboard</h1>

<div class="grid">
  <a href="notes.html" class="card">
    <span class="icon">📝</span>
    NOTES
  </a>
  <a href="info.html" class="card">
    <span class="icon">ℹ️</span>
    INFO
  </a>
  <a href="test.html" class="card">
    <span class="icon">⚙️</span>
    TESTS
  </a>
  <a href="games.html" class="card">
    <span class="icon">🎮</span>
    GAMES
  </a>
  <a href="calculator.html" class="card">
    <span class="icon">📟</span>
    CALCULATOR
  </a>
  <a href="unitconverter.html" class="card">
    <span class="icon">📟</span>
    UNIT CONVERTER
  </a>
</div>

</div>

</body>
</html>
