<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
        --glass-bg: rgba(255, 255, 255, 0.15);
        --glass-border: rgba(255, 255, 255, 0.3);
        --text-color: #ffffff;
    }

    body {
        background: linear-gradient(135deg, #1e3c72, #2a5298, #2ecc71); /* Engineer Blue to Green */
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        font-family: 'Segoe UI', Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        min-height: 100vh;
        color: var(--text-color);
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    h1 {
        margin-top: 40px;
        font-weight: 300;
        letter-spacing: 2px;
        text-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 20px;
        width: 95%;
        max-width: 500px;
    }

    .card {
        background: var(--glass-bg);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-decoration: none;
        color: white;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .card:hover, .card:active {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.25);
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    }

    /* Animated Logos */
    .icon-box {
        font-size: 40px;
        margin-bottom: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Individual Animations */
    .ani-float { animation: floating 3s ease-in-out infinite; }
    .ani-pulse { animation: pulsing 2s infinite; }
    .ani-spin { animation: spinning 4s linear infinite; }
    .ani-shake { animation: shaking 0.5s infinite; }

    @keyframes floating {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }

    @keyframes pulsing {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
    }

    @keyframes spinning {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes shaking {
        0% { transform: rotate(0deg); }
        25% { transform: rotate(5deg); }
        75% { transform: rotate(-5deg); }
        100% { transform: rotate(0deg); }
    }

/* The "Spin-Zoom" Effect */
.ani-spin-zoom {
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.card:hover .ani-spin-zoom {
    /* Spins 360 degrees and zooms in by 40% */
    transform: rotate(360deg) scale(1.4);
}

/* Optional: Add a slight glow during the zoom */
.card:hover {
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
    border-color: rgba(255, 255, 255, 0.8);
}

    @keyframes spinZoomInfinite {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.2); }
    100% { transform: rotate(360deg) scale(1); }
}

.ani-auto-spin-zoom {
    animation: spinZoomInfinite 4s infinite linear;
}

    .label { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

    .download-card {
        grid-column: span 2;
        background: rgba(46, 204, 113, 0.3);
        border: 1px solid #2ecc71;
        height: 100px;
    }
  </style>
</head>
<body>

<h1>EKA SIR</h1>

<div class="grid">
  <!-- Notes: Floating Animation -->
  <a href="notes.html" class="card">
    <div class="icon-box ani-spin-zoom">📚</div>
    <div class="label">Notes</div>
  </a>

  <!-- Tests: Shaking Animation -->
  <a href="test.html" class="card">
    <div class="icon-box ani-shake">📝</div>
    <div class="label">Tests</div>
  </a>

  <!-- Games: Pulsing Animation -->
  <a href="games.html" class="card">
    <div class="icon-box ani-pulse">🎮</div>
    <div class="label">Games</div>
  </a>

  <!-- Calculator: Spinning Gears (using the gear icon) -->
  <a href="calculator.html" class="card">
    <div class="icon-box ani-float">⚙️</div>
    <div class="label">Calculator</div>
  </a>

  <!-- Converter: Scale Animation -->
  <a href="unitconverter.html" class="card">
    <div class="icon-box ani-float" style="animation-delay: -1s;">🔄</div>
    <div class="label">Converter</div>
  </a>

  <!-- Info: Pulse -->
  <a href="info.html" class="card">
    <div class="icon-box ani-pulse">💡</div>
    <div class="label">Info</div>
  </a>

  <a id="download-btn" href="EKA_SIR.apk" download class="card download-card">
    <div class="icon-box">📲</div>
    <div class="label">Download Android App</div>
  </a>
</div>

<script>
  // Logic to hide download button inside the app
  if (window.location.protocol === 'file:' || navigator.userAgent.includes('wv')) {
      document.getElementById('download-btn').style.display = 'none';
  }
</script>

</body>
</html>
