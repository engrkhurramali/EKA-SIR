<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games - EKA SIR</title>
    <style>
        body {
            background: linear-gradient(135deg, #87CEEB, #98FF98);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            padding-top: 50px; /* Adjusted for the Blue Bar */
            margin: 0;
        }

        .glass-panel {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .home-btn {
            text-decoration: none;
            background: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            color: #1a5f7a;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            transition: transform 0.2s;
        }

        .play-btn {
            display: inline-block;
            background: #0078D4; /* Matches your Blue Bar */
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 120, 212, 0.3);
        }

        .play-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<a href="index.html" class="home-btn">🏠 Home Dashboard</a>

<div class="glass-panel">
    <h1>🎮 Learning Games</h1>
    <p>Challenge your brain with interactive physics and math puzzles!</p>

    <div class="game-card">
        <h3>EKA FRUIT BASKET</h3>
        <p>Collect Fruits!</p>
        <a href="game1.html" class="play-btn">FRUIT BASKET</a>
    </div>
    <br>
    <div class="game-card">
        <h3>CROSSWORD</h3>
        <p>Test your VOCABULARY.</p>
        <a href="crossword.html" class="play-btn">CROSSWORD</a>
    </div>
    <br>
    <div class="game-card">
        <h3>GUESS WORD</h3>
        <p>Test your VOCABULARY.</p>
        <a href="guessword.html" class="play-btn">GUESS WORD</a>
    </div>
    <br>
    <div class="game-card">
        <h3>CLICK CLOCK</h3>
        <p>Test your REACTION TIME.</p>
        <a href="gameclickclock.html" class="play-btn">CLICK CLOCK</a>
    </div>
</div>

</body>
</html>
