<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chemistry Class 10 Exercises - EKA SIR</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.25);
            --glass-heavy: rgba(255, 255, 255, 0.4);
            --sky-blue: #87CEEB;
            --mint-green: #98FF98;
            --text-dark: #1a5f7a;
            --border: rgba(255, 255, 255, 0.5);
            --accent: #ff6b6b;
        }

        body {
            background: linear-gradient(135deg, var(--sky-blue), var(--mint-green));
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1), inset 0 0 15px rgba(255, 255, 255, 0.3);
            box-sizing: border-box;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-btn {
            background: var(--glass-heavy);
            padding: 10px 15px;
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: bold;
            border: 1px solid var(--border);
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .back-btn:active { transform: scale(0.9); }

        h1 {
            text-align: center;
            font-size: 1.2rem;
            margin: 0;
            text-transform: uppercase;
        }

        .chapter-title {
            background: var(--text-dark);
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            margin: 20px 0 10px 0;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .exercise-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .ex-btn {
            background: var(--glass-heavy);
            border: 1px solid var(--border);
            padding: 15px 10px;
            border-radius: 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: bold;
            color: var(--text-dark);
            text-decoration: none;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .ex-btn:active {
            background: #fff;
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .ex-btn span {
            font-size: 0.7rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Video Icon styling */
        .ex-btn::after {
            content: "▶ Watch Video";
            font-size: 0.65rem;
            color: var(--accent);
            margin-top: 4px;
            font-weight: 800;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="nav-header">
        <a href="notes.html" class="back-btn">⬅ Back</a>
        <h1>Chemistry Class 10</h1>
    </div>

    <p style="text-align:center; font-size: 0.8rem; margin-bottom: 20px; font-weight: 600;">Sindh Text Book Board (Video Solutions)</p>

    <div class="chapter-title">Chapter 9: Chemical Equilibrium</div>
    <div class="exercise-grid" id="ch9-grid"></div>

    <div class="chapter-title">Chapter 10: Acids, Bases and Salts</div>
    <div class="exercise-grid" id="ch10-grid"></div>

    <div class="chapter-title">Chapter 11: Organic Chemistry</div>
    <div class="exercise-grid" id="ch11-grid"></div>

    <div class="chapter-title">Chapter 12: Hydrocarbons</div>
    <div class="exercise-grid" id="ch12-grid"></div>

    <div class="chapter-title">Chapter 13: Biochemistry</div>
    <div class="exercise-grid" id="ch13-grid"></div>

    <div class="chapter-title">Chapter 14: Atmosphere</div>
    <div class="exercise-grid" id="ch14-grid"></div>

    <div class="chapter-title">Chapter 15: Water</div>
    <div class="exercise-grid" id="ch15-grid"></div>

    <div class="chapter-title">Chapter 16: Chemical Industries</div>
    <div class="exercise-grid" id="ch16-grid"></div>

</div>

<script>
    const chapters = [
        { id: 9, title: "Chemical Equilibrium" },
        { id: 10, title: "Acids & Bases" },
        { id: 11, title: "Organic Chem" },
        { id: 12, title: "Hydrocarbons" },
        { id: 13, title: "Biochemistry" },
        { id: 14, title: "Atmosphere" },
        { id: 15, title: "Water" },
        { id: 16, title: "Industries" }
    ];

    const categories = [
        { id: 'theory', label: 'Theory Solution' },
        { id: 'num', label: 'Numericals' },
        { id: 'mcq', label: 'MCQs Prep' },
        { id: 'sum', label: 'Summary / Key' }
    ];

    const channelLink = "https://www.youtube.com/@engineerkhurramali";
    const videoLinks = {};

    function generateButtons() {
        chapters.forEach(ch => {
            const grid = document.getElementById(`ch${ch.id}-grid`);
            if (!grid) return;

            categories.forEach(cat => {
                const linkKey = `${ch.id}_${cat.id}`;
                const link = videoLinks[linkKey] || channelLink;

                const btn = document.createElement('a');
                btn.className = 'ex-btn';
                btn.href = link;
                btn.target = "_blank";
                btn.innerHTML = `<span>Chapter ${ch.id}</span>${cat.label}`;
                grid.appendChild(btn);
            });
        });
    }

    generateButtons();
</script>

</body>
</html>
