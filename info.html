<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info - EKA SIR</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --mint-green: #98FF98;
            --text-dark: #1a5f7a;
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }
        body {
            background: linear-gradient(135deg, var(--sky-blue), var(--mint-green));
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            text-decoration: none;
            background: #fff;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
            z-index: 100;
        }
        .back-btn:active { transform: scale(0.9); }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin-top: 60px;
            color: var(--text-dark);
            text-align: center;
        }
        h1 { margin: 0 0 15px; font-size: 1.6rem; text-transform: uppercase; }
        p { line-height: 1.6; opacity: 0.9; }
    </style>
</head>
<body>
<a href="index.html" class="back-btn">⬅</a>
<div class="glass-panel">
    <h1>ℹ️ Information Center</h1>
    <p>Welcome to the EKA SIR Educational Platform.</p>
    <p>This application is designed to provide high-quality educational resources, including notes, CBT assessments, and interactive learning games for students.</p>
    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.85rem;">
        <b>Version:</b> 3.5.0 (PWA)<br>
        <b>Developed by:</b> EKA SIR Team
    </div>
</div>
</body>
</html>
