<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info - EKA SIR</title>
    <style>
        :root {
            --sky-blue: #87CEEB;
            --mint-green: #98FF98;
            --text-dark: #1a5f7a;
            --glass: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.4);
        }
        body {
            background: linear-gradient(135deg, var(--sky-blue), var(--mint-green));
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .back-btn {
            position: fixed;
            top: 15px;
            left: 15px;
            text-decoration: none;
            background: #fff;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-weight: bold;
            color: var(--text-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s;
            z-index: 100;
        }
        .back-btn:active { transform: scale(0.9); }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px 20px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            margin-top: 60px;
            color: var(--text-dark);
            text-align: center;
        }
        h1 { margin: 0 0 15px; font-size: 1.6rem; text-transform: uppercase; }
        p { line-height: 1.6; opacity: 0.9; }

        /* Grid and Card Styles */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 0;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            height: 110px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card:hover, .card:active {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .icon-box {
            font-size: 35px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .ani-float { animation: floating 3s ease-in-out infinite; }

        @keyframes pulsing {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .ani-pulse { animation: pulsing 2s infinite; }

        @keyframes spinning {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .ani-spin { animation: spinning 4s linear infinite; }

        @keyframes shaking {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
            100% { transform: rotate(0deg); }
        }
        .ani-shake { animation: shaking 0.5s infinite; }
    </style>
</head>
<body>
<a href="index.html" class="back-btn">⬅</a>
<div class="glass-panel">
    <h1>ℹ️ Information Center</h1>
    <p>Welcome to the EKA SIR Educational Platform.</p>

    <div class="grid">
        <!-- Web Tools & Links -->

        <a href="BMI_MODULE.html" class="card">
            <div class="icon-box ani-pulse">📺</div>
            <div class="label">BMI CALCULATOR</div>
        </a>

            <a href="https://www.youtube.com/@engineerkhurramali" class="card">
            <div class="icon-box ani-pulse">📺</div>
            <div class="label">YouTube</div>
        </a>

        <a href="https://www.google.com" class="card">
            <div class="icon-box ani-float">🔍</div>
            <div class="label">Search</div>
        </a>

        <a href="https://www.wikipedia.org" class="card">
            <div class="icon-box ani-shake">📖</div>
            <div class="label">Wikipedia</div>
        </a>

        <a href="https://translate.google.com" class="card">
            <div class="icon-box ani-spin">🌐</div>

        </a>

        <a href="https://phet.colorado.edu" class="card">

        <a href="https://chat.openai.com" class="card">

    </div>

    <div style="margin-top: 10px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.85rem;">
        <b>Version:</b> 3.5.0 (PWA)<br>
        <b>Developed by:</b> EKA SIR Team
    </div>
</div>
</body>
</html>
